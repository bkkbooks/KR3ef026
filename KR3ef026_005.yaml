body:
  text: 卷三尚論仲景傷寒論重編三百九十七法尚論少陽經證治大意仲景少陽經之原文叔和大半編入太陽經中昌殊不得其解豈以太陽行身之背少陽行身之側其營衛顯然易辨非如陽明與三陰之屬腑臟者營衛難窺故將少陽之文匯入太陽耶此等處竊不敢仍叔和之舊蓋六經各有專司乃引少陽之文與三陽合病並病過經不解及壞病諸條悉入太陽篇中適足以亂太陽之正也在太陽一經之病已倍他經辨之倍難而無端蔓引混收此後人所為多歧亡羊乎茲將治少陽之法悉歸本篇其合病並病壞病痰病另隸於三陽經後庶太陽之脈清而少陽之脈亦清耳少陽證用小柴胡湯和解加減一法傷寒五六日中風往來寒熱胸脅苦滿默默不欲飲食心煩喜嘔或胸中煩而不嘔或渴或腹中痛或脅下痞硬或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之傷寒中風有柴胡證但見一證便是不必悉具若胸中煩而不嘔去半夏人參加栝蔞實若渴者去半夏加人參栝蔞根若腹中痛去黃芩加芍藥若脅下痞硬去大棗加牡蠣若心下悸小便不利者去黃芩加茯苓若不渴外有微熱者去人參加桂枝溫覆取微似汗愈若咳者去人參大棗生薑加五味子乾薑原文軀殼之表陽也軀殼之裡陰也少陽主半表半裡之間其邪入而並於陰則寒出而並於陽則熱往來寒熱無常期也風寒之外邪挾身中有形之痰飲結聚於少陽之本位所以胸脅苦滿也胸脅既滿胃中之水穀亦不消所以默默不欲食即昏昏之意非靜默也心煩者邪在胸脅逼處心間也或嘔不嘔或渴不渴諸多見證各隨人之氣體不盡同也然總以小柴胡之和法為主治而各隨見證以加減之耳少陽病有辨證一法少陽之為病口苦咽乾目眩也原文口苦咽乾者熱聚於膽也目眩者木盛生風而旋暈也少陽病有汗吐下三禁二法傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈胃不和則煩而悸原文少陽傷寒禁發汗少陽中風禁吐下二義互舉其旨益嚴蓋傷寒之頭痛發熱宜於發汗者尚不可汗則傷風之不可汗更不待言矣傷風之胸滿而煩痰飲上逆似可吐下者尚不可吐下則傷寒之不可吐下更不待言矣脈弦細者邪欲入里其在胃之津液必為熱耗重復發汗而驅其津液外出安得不譫語乎胃和者邪散而津回也不和者津枯而飲結所以煩而悸也少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚原文風熱上壅則耳無聞目赤無形風熱與有質痰飲搏結則胸滿而煩此但從和解中行分竭法可也若誤汗下則胸中正氣大傷而邪得以逼亂神明此時即為城下之盟所喪不滋多乎辨少陽經病有欲解不解四法傷寒三日三陽為盡三陰當受邪其人反能食不嘔此為三陰不受邪也原文能食不嘔與胃和則愈之義互發傷寒三日少陽脈小者欲已也原文脈不弦大邪微欲解之先徵也少陽病欲解時從寅至辰上原文受病之經正氣虛衰每藉力於時令之王此趨三避五所由來乎傷寒六七日無大熱其人躁煩者此為陽去入陰故也原文陽去入陰則邪勢得以留連轉致危困者多矣有治傷寒之責者線索在手於邪在陽經之日亟從外奪不亦善乎少陽證具將欲入里而太陽陽明小有未罷但用小柴胡湯一法傷寒四五日身熱惡風頸項強脅下滿手足溫而渴者小柴胡湯主之原文身熱惡風太陽證也頭項強太陽兼陽明證也脅下滿少陽證也本當從三陽合並病之例而用表法但其手足溫而加渴外邪輻湊於少陽而向里之機已著倘更用辛甘發散之法是重增其熱而大耗其津也故從小柴胡之和法則陽邪自罷而陰津不傷一舉而兩得矣此用小柴胡湯當從加減法不嘔而渴者去半夏加栝蔞根為是少陽證脈弦澀加腹痛先用建中後用小柴胡一法傷寒陽脈澀陰脈弦法當腹中急痛者先與小建中湯不差者與小柴胡湯主之原文陽脈澀陰脈弦渾似在裡之陰寒所以法當腹中急痛故以小建中之緩而和其急腹痛止而脈不弦澀矣若不差則弦為少陽之本脈而澀乃汗出不徹腹痛乃邪欲傳太陰也則用小柴胡以和陰陽為的當無疑矣少陽證縣已經汗下而太陽未罷胸有微結者宜用柴胡桂枝幹薑湯一法傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝幹薑湯主之原文少陽證尚兼太陽所以誤下而胸間微結也太陽中篇結胸條內頭微汗出用大陷胸湯以其熱結在裡故從下奪之法也此頭汗出而胸微結用柴胡桂枝幹薑湯以里證未具故從和解之法也小柴胡方中減半夏人參而加桂枝以行太陽加乾薑以散滿栝蔞根以滋干牡蠣以軟結一一皆從本例也少陽證服小柴胡湯加渴者宜救津液一法服柴胡湯已渴者屬陽明也以法治之原文風寒之邪從陽明而轉少陽起先不渴里證未具及服小柴胡湯已重加口渴則邪還陽明而當調胃以存津液矣然不曰攻下而曰以法治之意味無窮蓋少陽之寒熱往來間有渴證倘少陽未罷而恣言攻下不自犯少陽之禁乎故見少陽重轉陽明之證但云以法治之其法維何即發汗利小便已胃中躁煩實大便難之說也若未利其小便則有豬苓五苓之法若津乾熱熾又有人參白虎之法仲景丸機活潑人存政舉未易言矣少陽證具誤下而證尚未變者仍用小柴胡湯二法凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解原文傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡湯不中與之宜半夏瀉心湯原文二條互發前略後詳誤下雖證未變然正氣先虛胡服柴胡湯必蒸蒸而振始得發熱汗出而邪從表解也若誤下而成結胸與痞則邪尚在太陽而柴胡非所宜矣結胸及痞太陽經各有專條重以汗下為逆不為逆申上文而廣其義本發汗而復下之此為逆也若先發汗治不為逆本先下之而反汗之此為逆也若先下之治不為逆原文少陽雖有汗下二禁然而當汗當下正自不同本當發汗而反下之則為逆若先汗後下則不為逆本當下之而反發汗則為逆若先下後汗則不為逆全在辨其表裡差多差少之間矣少陽病有疑似少陰者當細辨脈證用藥一法傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有里也脈沉亦在裡也汗出為陽微假令純陰結不得復有外證悉入在裡此為半在裡半在外也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解原文陽微結者陽邪微結未盡散也注作陽氣衰微故邪氣結聚大差果爾則頭汗出為亡陽之證非半表半裡之證矣果爾則陰結又是陰氣衰微矣玩本文假令純陰結等語謂陽邪若不微結純是陰邪內結則不得復有外證其義甚明得屎而解即取大柴胡為和法之意也用汗吐下後有辨脈證而識其必愈一法凡病若發汗若吐若下若亡津液陰陽自和者必自愈原文汗吐下三法難於恰當若誤用之則病未去而胃中之津液已先亡凡見此者診視其脈與證陰陽自和則津液復生必自愈也辨婦人傷寒傳少陽有熱入血室之證四法婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之原文婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之原文婦人傷寒發熱經水適來晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦必自愈原文血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食藏府相連其痛必下邪高痛下故使嘔也小柴胡湯主之原文四條皆互文見意也一云經水適來一云經水適斷一云七八日熱除而脈遲身涼一云七八日續得寒熱發作有時一云胸脅下滿一云邪氣因入與正氣相摶結於脅下一云如結胸狀一云邪高痛下一云譫語一云晝日明瞭暮則譫語如見鬼狀一云如瘧狀一云往來寒熱休作有時一云刺期門一云用小柴胡湯一云毋犯胃氣及上二焦皆互文以明大義而自為注腳也學者試因此而細繹全書思過半矣如結胸狀四字仲景尚恐形容不盡重以藏府相連邪高痛下之語暢發病情蓋血室者衝脈也下居腹內厥陰肝之所主也而少陽之膽與肝相連腑邪在上臟邪在下胃口逼處二邪之界所以默默不欲飲食而但喜嘔耳期門者肝之幕也隨其實而瀉之瀉肝之實也又刺期門之注腳也小柴胡湯治少陽之正法也毋犯胃氣及上二焦則舍期門小柴胡更無他法矣必自愈見腑邪可用小柴胡湯而臟邪必俟經水再行其邪熱乃隨血去又非藥之所能勝耳少陽止此重編合病並病壞病痰病附三陽經後其過經不解附三陰經後上症叔和俱編入太陽經中不知何意或謂傷寒只分六經舍太陽一經別無可入諸項也然則霍亂證及陰陽易等證曷不盡入太陽耶況乎既重六經則少陽亦六經之一曷為不重耶茲一一清出以六經等六國以合並諸病等附庸俾業傷寒者一展玩而瞭然於心目耳合病合病者兩經之證各見一半如日月之合朔如王者之合圭璧界限中分不偏多偏少之謂也太陽病項背強𠘧𠘧反汗出惡風者桂枝加葛根湯主之原文太陽病項背強𠘧𠘧無汗惡風者葛根湯主之原文二條以有汗無汗定傷風傷寒之別蓋太陽初交陽明未至兩經各半故仲景原文不用合病二字然雖不名合病其實乃合病之初證也𠘧𠘧者頸不舒也頸屬陽明既於太陽風傷衛證中才見陽明一證即於桂枝湯內加葛根一藥太陽寒傷營證中才見陽明一證即於麻黃湯內加葛根一藥此大匠天然不易之彀率也然第二條不用麻黃全方加葛根反用桂枝全方加麻黃葛根者則並其巧而傳之矣見寒邪既欲傳於陽明則胸間之喘必自止自可不用杏仁況頸項背俱是陽位易於得汗之處設以麻黃本湯加葛根大發其汗將毋項背強𠘧𠘧者變為經脈振搖動惕乎此仲景之所為精義入神也桂枝湯麻黃湯分主太陽之表葛根湯總主陽明之表小柴胡湯總主少陽之表三陽經合並受病即隨表邪見證多寡定方絲絲入扣太陽與陽明合病不下利但嘔者葛根加半夏湯主之原文太陽與陽明合病者必自下利葛根湯主之原文二條又以下利不下利辨別合病主風主寒之不同也風者陽也陽性上行故合陽明胃中之水飲而上逆寒者陰也陰性下行故合陽明胃中之水穀而下奔然上逆則必加半夏入葛根湯以滌飲止嘔若下利則但用葛根湯以解兩經之邪不治利而利自止耳葛根湯即第一條桂枝湯加葛根不用麻黃者是也太陽與陽明合病喘而胸滿者不可下麻黃湯主之原文兩經合病當合用兩經之藥何得偏用麻黃湯耶此見仲景析義之精蓋太陽邪在胸陽明邪在胃兩邪相合必上攻其肺所以喘而胸滿麻黃杏仁治肺氣喘逆之專藥用之恰當正所謂內舉不避親也何偏之有太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯原文太陽陽明合病下利表證為多陽明少陽合病下利里證為多太陽少陽合病下利半表半裡之證為多故用黃芩甘草芍藥大棗為和法也陽明少陽合病必下利其脈不負者順也負者失也互相剋賊名為負也脈滑而數者有宿食也當下之宜大承氣湯原文土木之邪交動則水穀不停而急奔故下利可必也陽明脈大少陽脈弦兩無相負乃為順候然兩經合病陽明氣衰則弦脈獨見少陽勝而陽明負矣下之固是通因通用之法而土受克賊之邪勢必藉大力之藥急從下奪乃為解圍之善著然亦必其脈滑而且數有宿食者始為當下無疑也設脈不滑數而遲軟方慮土敗垂亡尚敢下之乎按太陽與陽明合病陽明與少陽合病俱半兼陽明所以胃中之水穀不安而必自下利其有不下利者亦必水飲上越而嘔與少陽一經之證乾嘔者大不同也或利或嘔胃中之真氣與津液俱傷所以亟須散邪以安其胃更慮少陽勝而陽明負即當急下以救陽明其取用大承氣湯正迅掃外邪而承領元氣之義也設稍牽泥則脈之滑數必轉為遲軟下之無及矣微哉危哉三陽合病脈浮大上關上但欲眠睡目合則汗原文三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗者白虎湯主之原文三陽合病五合之表裡俱傷故其脈浮大其證欲眠而目合則汗中州之擾亂可知矣此時發汗則偏於陽而陽明之津液倍竭故譫語益甚將成無陽之證也下之則偏於陰而真陽以無偶而益孤故手足逆冷而額上生汗將成亡陽之證也既不宜於汗下惟有白虎一湯主解熱而不礙表裡在所急用然非自汗出則表猶未解尚未可用此證夏月最多當與痙濕暍篇參看按三陽經之受外邪太陽頭疼腰脊痛陽明目痛鼻乾不眠少陽寒熱往來口苦嘔渴各有專司合病者即兼司二陽三陽之證也仲景但以合之一字括其義而歸重在下利與嘔喘胸滿之內症蓋以邪既相合其人腹內必有相合之徵驗故也後人於此等處漫不加察是以不知合病為何病耳再按少陽篇第九條云傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之一條其證全是太陽與少陽合並之病但內無下利其嘔復微即不謂之合病心下支結又與心下痞硬時如結胸者不同即不謂之並病乃知合並之病重在內有合並之微驗非昌之臆說矣後人謂三陽合病宜從中治此等議論似得仲景表邪未散用小柴胡湯裡熱已極用白虎湯之旨然未可向癡人說夢也設泥此則仲景所用麻黃湯大承氣湯之妙法萬不敢從矣噫吾安得盡闢捷徑為周行也哉並病並病者兩經之證連串為一如貫索然即兼併之義也並則不論多寡一經見三五證一經見一二證即可言並病也然太陽證多陽明少陽證少如秦之並六國者乃病之常若陽明少陽證多太陽證少則太陽必將自罷又不得擬之為六國並秦矣二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發汗設面色緣緣正赤者陽氣怫鬱在表當解之熏之若發汗不徹不足言陽氣怫鬱不得越當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也原文二陽並病太陽證罷但發潮熱手足漐漐汗出大便難而譫語者下之則愈宜大承氣湯原文按二陽並病二條皆是太陽與陽明並也上條證初入陽明而太陽仍未罷宜小汗此條證已入陽明而太陽亦隨罷宜大下所以宜小汗大下之故昌言之已悉可以無贅但上條之文從前未有注釋茲特明之太陽初得寒傷營之病以麻黃湯發其汗汗出而邪去病不傳矣因汗出不徹故傳陽明續自微汗出不惡寒陽明熱熾似乎當用下法以太陽之邪未徹故下之為逆謂其必成結胸等症也如此者可小發汗然後下之設面色緣緣正赤者寒邪深重陽氣怫鬱在表必始先未用麻黃湯或已用麻黃湯而未得汗所以重當解之熏之又非小發汗所能勝也若是發汗不徹不足言陽氣怫鬱不得越也畢竟當汗不汗其人躁煩不知痛處乍在腹中乍在四肢按之不可得方是陽氣不得越耳短氣者因汗而氣傷也脈澀者因汗而血傷也汗雖未徹其已得汗可知其不拂鬱又可知所以宜更他藥以小發其汗更字讀平聲與太陽中篇傷寒發汗解半日許復煩脈浮數者可更發汗互發然則彼更桂枝湯此更桂枝加葛根湯並可推矣太陽與少陽並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門原文少陽之脈絡脅脅間併入太陽之邪則與結胸證似是而實非也肝與膽合刺肝俞所以瀉膽也膀胱不與肺合然肺主氣刺肺俞以通其氣斯膀胱之氣化行而邪自不能留矣發汗則譫語與合病木盛剋土之意同注謂木盛則生心火節外生枝反失正意脈弦亦即合病內少陽勝而陽明負之互詞此所以刺期門隨木邪之實而瀉之也仲景通身手眼後人只泥於一手一目可乎太陽少陽並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之原文重申不可下之禁與上條不可汗互發太陽少陽並病而反下之成結胸心下硬下利不上水漿不下其人心煩原文誤下之變乃至結胸下利上下交徵而陽明之居中者水漿不入心煩待斃傷寒顧可易言哉並病即不誤用汗下已如結胸心下痞硬矣況加誤下乎此比太陽一經誤下之結胸殆有甚焉其人心煩似不了之語然仲景太陽經謂結胸證悉具煩躁者亦死意者此謂其人心煩者死乎壞病壞病者已汗已吐已下已溫針病猶不解治法多端無一定可擬故名之為壞病也壞病與過經不解大異過經不解者連三陰經俱已傳過故其治但在表裡差多差少宜先宜後之間若壞病則在三陽未入於陰故其治但在陽經其證有結胸下利眩冒振惕驚悸譫妄嘔噦躁煩之不同其脈有弦促細數緊滑沉微澀弱結代之不同故必辨其脈證犯何逆然後得以法而治其逆也太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也觀其脈證知犯何逆隨證治之原文相傳傷寒過經日久二三十日不痊者謂之壞病遂與過經不解之病無辨此古今大誤也仲景止說病三日即五六日亦未說到且此條止說太陽病連少陽亦未說到故謂桂枝偏表之法不可用觀下條太陽轉入少陽之壞證有柴胡證罷四字可見此為桂枝證罷故不可復用也設桂枝證仍在即不得謂之壞病與少陽篇內柴胡證仍在者此雖已下之不為逆復與柴胡湯必蒸蒸而振卻發熱汗出而解之文又互相綰照也豈有桂枝柴胡之證尚未罷而得指為壞病之理哉故必細察其脈為何脈證為何證從前所誤今犯何逆然後隨其證而治之始為當耳本太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡湯證罷此為壞病知犯何逆以法治之原文按上條太陽經之壞病也此條少陽經之壞病也兩條文意互發其旨甚明叔和分匯致滋疑惑茲合而觀之乃知上條云桂枝湯不中與則其所犯要不離於太陽一經之誤吐誤下誤發汗誤燒針之諸逆也此條云柴胡湯不中與則其所犯要不離於少陽一經之誤吐誤下誤發汗誤燒針之諸逆也後人擬議何逆四治見為創穫由茲觀之真囈語矣痰病概自傷寒失傳後人乃以食積虛煩痰飲腳氣牽合為類傷寒四證此等名目一出凡習傷寒之家苟簡粗疏已自不識要妙況復加冬溫溫病寒疫熱病濕溫風溫霍亂痙內癰畜血為類傷寒十四證頭上安頭愈求愈失茲欲直溯淵源不得不盡闢歧派蓋仲景於春夏秋三時之病既以冬月之傷寒統之則十四證亦皆傷寒中之所有也若諉之局外漫不加察至臨模糊其何以應無窮之變哉昌於春夏病中逐段拈出茲於三陽經後特立痰病一門凡痰飲素積之人有挾外感而動者有不由外感而自動者仲景分別甚明挾外感之邪摶結胸脅三陽篇中已致詳矣此但舉不由外感之痰病昭揭其旨俾學者辨證以施治焉耳病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散諸亡血虛家不可與原文寒者痰也痰飲內動身必有汗加以發熱惡寒全似中風但頭不痛項不強此非外入之風乃內蘊之痰窒塞胸間宜用瓜蒂散以湧出其痰也病人有寒復發汗胃中冷必吐蛔原文寒亦痰也此即上條之互文上條辨非桂枝之證此條辨不可發汗蓋痰從內動無外感與俱誤發其汗必至迷塞經絡留連不返故示戒也設兼外感如三陽證中諸條則無形之感挾有形之痰結於一處非汗則外邪必不解即強吐之其痰飲亦必不出所以小青龍一法卓擅奇功耳此言有痰無感誤發其汗重亡津液即大損陽氣其人胃冷而吐蛔有必至也病人手足厥冷脈乍緊者邪結在胸中心中滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散原文手足厥冷與厥陰之熱深厥深相似其脈乍緊則有時不緊殊不似矣可見痰結在胸故滿煩而不能食亦宜瓜蒂散為吐法也合三條總見痰症可吐不可汗合食積虛煩腳氣四證論之勿指為類傷寒但指為不可發汗則其理甚精蓋食積胸中陽氣不布更發汗則陽氣外越一團陰氣用事愈成危候虛煩則胃中津液已竭更發汗則津液盡亡矣腳氣即地氣之溫邪從足先受者正濕家不可發汗之義耳奈何舍正路而趨曲徑耶門人問曰吾師於三陽證中挈出合病並病壞病痰病之條可謂暗室一燈炯然達旦矣但不識陽明何以無壞病耶答曰陽明之誤治最多其脈證固當辨別但不得以壞病名之也蓋陽明原有可汗可下之條汗下原不為大逆且誤在汗當不誤在下矣誤在下當不誤在汗矣即使汗下燒針屢誤其病亦止在胃中原有定法可施與壞證無定法之例微有不協此壞病所以不入陽明耳門人又問曰救陽明誤治之定法可得聞乎答曰仲景云陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之觀其誤汗誤燒針之變煩躁怵惕譫語不眠止是邪在胃中擾其津液與亡陽之證不同也觀其誤下之變客氣動膈心中懊憹止是熱邪上膈心逼不安與結胸之證不同也故遵內經高者越之之旨以梔子豉湯湧出其邪耳此非無定中之定法乎
