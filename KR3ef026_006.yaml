body:
  text: 卷四尚論仲景傷寒論重編三百九十七法卷四上尚論太陰經證治大意仲景傷寒論六經中惟太陰經文止九條方止二道後人致惜其非全書昌細繹其所以約略之意言中風即不言傷寒言桂枝即不言麻黃言當溫者則曰宜四逆輩全是引伸觸類之妙可見治法總不出三陽外但清其風寒之原以定發汗解肌更於腹之或滿或痛間辨其虛實以定當下當溫而已了無余義矣自非深入閫奧者孰能會其為全書也哉太陰經全篇法九條太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬原文腹滿自利太陰之本證也吐而食不下則邪迫於上利甚而腹痛則邪迫於下上下交亂胃中空虛此但可行溫散設不知而誤下之其在下之邪可去而在上之邪陷矣故胸下結硬與結胸之變頗同胃中津液上結胸中陽氣不布卒難開也太陰中風四肢煩疼陽微陰澀而長者為欲愈原文四肢煩疼者脾主四肢亦風淫末疾之驗也陽脈微陰脈澀則風邪已去而顯不足之象但脈見不足正恐元氣已漓暗伏危機故必微澀之中更察其脈之長而不短知元氣未漓其病為自愈也注不審來意謂澀為血凝氣滯大謬豈有血凝氣滯反為欲愈之理耶太陰病脈浮者可發汗宜桂枝湯原文太陰脈尺寸俱沉細今脈浮則邪還於表可知矣故仍用桂枝解肌之法也太陽經中以浮緩為中風浮緊為傷寒故此不重贅但揭一浮字其義即全該風邪用桂枝湯其脈之浮緩不待言矣然則寒邪之脈浮緊其當用麻黃湯更不待言矣況少陽篇中雲設胸滿脅痛者與小柴胡湯脈但浮者與麻黃湯早已挈明用麻黃湯之義故於太陰證中但以桂枝互之乃稱全現全彰也不然同一浮脈何所見而少陽當用麻黃太陰當用桂枝也哉自利不渴者屬太陰以其藏有寒故也當溫之宜服四逆輩原文注謂自利不渴濕邪也故用四逆輩以燠土燥濕此老生腐變非切要也仲景大意以自利不渴者屬太陰以自利而渴者屬少陰分經辨證所關甚巨蓋太陰屬濕土熱邪入而蒸動其濕則顯有餘故不渴而多發黃少陰屬腎水熱邪入而消耗其水則顯不足故口渴而多煩躁若不全篇體會徒博注釋之名其精微之蘊不能闡發者多矣傷寒脈浮而緩手足自溫者系在太陰太陰當發身黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實穢腐當去故也原文太陰脈本緩故浮緩雖類太陽中風然手足自溫則不似太陽之發熱並不似少陰厥陰之四逆與厥所以系在太陰允為恰當也太陰脈見浮緩其濕熱交盛勢必蒸身為黃若小便自利者濕熱從水道暗泄不能發黃也前陽明篇中不能發黃以上語句皆同但彼以胃實而便硬其證復轉陽明此以脾實而下穢腐其證正屬太陰耳至七八日暴煩下利日十餘行其證又與少陰無別而利盡穢腐當自止則不似少陰之煩躁有加下利漫無止期也況少陰之煩而下利手足反溫脈緊反去者仍為欲愈之候若不辨晰而誤以四逆之法治之幾何不反增危困耶雖陽明與太陰腑臟相連其便硬與下利自有陽分陰分之別注家歸重於脾謂脾為胃行津液則如此不為胃行津液則如彼似是而非全失仲景三陰互發之旨本太陽病醫反下之因爾腹滿時痛者屬太陰也桂枝加芍藥湯主之原文太陽病之誤下其變皆在胸脅以上此之誤下而腹滿時痛無胸脅等證則其邪已入陰位所以屬在太陰也仍用桂枝解肌之法以升舉陽邪但倍芍藥以收太陰之逆氣本方不增一藥斯為神耳大實痛者桂枝加大黃湯主之原文大實大滿宜從急下然陽分之邪初陷太陰未可峻攻但於桂枝湯中少加大黃七表三里以分殺其邪可也太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其人胃氣弱易動故也原文此段叮嚀與陽明篇中互發陽明曰不轉失氣曰先硬後溏曰未定成硬皆是恐傷太陰脾氣此太陰證而脈弱便利減大黃芍藥又是恐傷陽明胃氣也太陰病欲解時從亥至醜上尚論少陰經證治大意傳經熱邪先傷經中之陰甚者邪未除而陰已竭獨是傳入少陰其急下之證反十之三急溫之證反十之七而宜溫之中復有次第不同毫釐千里粗工不解必於曾犯房勞之證始敢用溫及遇一切當溫之證反不能用詎知未病先勞其腎水者不可因是遂認為當溫也必其人腎中之真陽素虧復因汗吐下擾之外出而不能內返勢必藉溫藥以回其陽方可得生所以傷寒門中亡陽之證最多即在太陽已有種種危候至傳少陰其辨證之際仲景多少遲徊顧惜不得從正治之法清熱奪邪以存陰為先務也今以從權溫經之法疏為前篇正治存陰之法疏為後篇俾業醫者免臨歧之惑云少陰經前篇凡本經宜溫之證悉列此篇少陰病始得之反發熱脈沉者麻黃附子細辛湯主之原文脈沉為在裡證見少陰不當復有外熱若發熱者乃是少陰之表邪即當行表散之法者也但三陰之表法與三陽迥異三陰必以溫經之藥為表而少陰尤為緊關故麻黃與附子合用俾外邪出而真陽不出才是少陰表法之正也少陰病得之一二日口中和其背惡寒者當灸之附子湯主之原文得之一二日即上條始得之之互文口中和者不渴不燥全無裡熱其背惡寒則陽微陰盛之機已露一班故灸之以火助陽而消陰主之以附子湯溫經而散寒也少陰病得之二三日麻黃附子甘草湯微發汗以二三日無里證故微發汗也原文不吐利煩躁嘔渴為無里證即無里證病尚在表可知故以甘草易細辛而微發汗又溫散之緩法也少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也原文欲吐不吐心煩腎氣上逆之徵也自利而渴加以口燥舌乾引水自救似乎傳經熱病之形悉具然腎熱則水道黃赤若小便色白又非腎熱證乃下焦虛寒不能制水仍當從事溫法不可誤認為熱而輕用寒下也病人脈陰陽俱緊反汗出者亡陽也此屬少陰法當咽痛而復吐利原文陰陽俱緊傷寒之脈也傷寒無汗反汗出者無陽以固護其外所以邪不出而汗先出也少陰之邪不出則咽痛吐利一一顯少陰之本證即當用少陰溫經散邪之法不言可知矣少陰病脈微不可發汗亡陽故也陽已虛尺脈弱澀者復不可下之原文亡陽不可發汗與上條互發亡與無同無陽則其邪為陰邪陰邪本宜下然其人陽已虛尺脈弱澀者復不可下其當亟行溫法又可見矣少陰病下利若利自止惡寒而踡臥手足溫者可治原文惡寒踡臥證本虛寒利止手足溫則陽氣未虧其陰寒亦易散故可用溫法也少陰病惡寒而踡時自煩欲去衣被者可治原文自煩欲去衣被真陽擾亂不寧然尚未至出亡在外故可用溫法也少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈原文三條互見此則邪解陽回可勿藥自愈之證即緊去入安之互詞也少陰病身體痛手足寒骨節痛脈沉者附子湯主之原文身體痛手足寒骨節痛脈沉皆寒邪入少陰之本證即當用附子湯行溫經散寒之定法也少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之原文吐利厥冷而至於煩躁欲死腎中之陰氣上逆將成危候故用吳茱萸以下其逆氣而用人參薑棗以厚土則陰氣不復上干此之溫經兼用溫中矣少陰病下利白通湯主之原文下利無陽證者純陰之象恐陰盛而隔絶其陽故用白通湯以通其陽而消其陰也少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生原文與白通湯反至厥逆無脈乾嘔而煩此非藥之不勝病也以無嚮導之力宜其不入耳故復加人尿豬膽汁之陰以引陽藥深入然脈暴出者死微續者生亦危矣哉故上條才見下利早用白通圖功於未著真良法也少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或下利或嘔者真武湯主之原文陰寒內持濕勝而水不行因而內滲外薄甚至水穀不分或咳或利泛溢無所不之非賴真武坐鎮北方之水寧有底哉太陽篇中厥逆筋惕肉瞤而亡陽者用真武湯之法已表明之矣茲少陰之水濕上逆仍用真武一法以鎮攝之可見太陽膀胱與少陰腎一藏一府同居北方寒水之位府邪為陽邪藉用麻桂為青龍藏邪為陰邪藉用附子為真武得此二湯以滌痰導水消陰攝陽其神功妙濟真有不可思議者矣少陰病下利清穀裡寒外熱手足厥逆脈微欲絶身反不惡寒其人面赤色或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之其脈即出者愈原文下利裡寒種種危殆其外反熱其面反赤其身反不惡寒而手足厥逆脈微欲絶明系群陰隔陽於外不能內返也故仿白通之法加蔥入四逆湯中以入陰迎陽而復其脈也前條云脈暴出者死此條云脈即出者愈其辨最細蓋暴出則脈已離根即出則陽已返舍由其外反發熱反不惡寒真陽尚在軀殼然必通其脈而脈即出始為休徵設脈出艱遲其陽已隨熱勢外散又主死矣少陰病脈沉者急溫之宜四逆湯原文外邪入少陰宜與腎氣兩相搏擊乃脈見沉而不鼓即內經所謂腎脈獨沉之義其人陽氣衰微可知故當急溫之以助其陽也少陰病飲食入口即吐心下溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者不可吐也急溫之宜四逆湯原文飲食入口即吐猶曰胃中不能納穀也若不飲食之時復欲吐而不能吐明系陰邪上逆矣此等處必加細察若始得之便手足寒而脈弦遲即非傳經熱邪其為陰邪上逆無疑當從事乎溫經之法也若胸中實者是為陽邪在胸而不在腹即不可用下而當吐以提之也然必果系陽邪方可用吐設膈上有寒飲乾嘔即是陰邪用事吐必轉增其逆計惟有急溫一法可助陽而勝陰矣少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之原文下利而脈見陽微陰澀為真陰真陽兩傷之候矣嘔者陰邪上逆也汗出者陽虛不能外固陰弱不能內守也數更衣反少者陽虛則氣下墜陰弱則勤弩責也是證陽虛本當用溫然陰弱復不宜於溫一藥之中即欲救陽又欲護陰漫難區別故於頂之上百會穴中灸之以溫其上而升其陽庶陽不致下陷以逼迫其陰然後陰得安靜不擾而下利自止耳此證設用藥以溫其下必逼迫轉加下利不止而陰立亡故不用溫藥但用灸法有如此之回護也前條用吳茱萸湯兼溫其中此條用灸法獨溫其上妙義天開令人舞蹈少陰病吐利手足不逆冷反發熱者不死脈不至者灸少陰七壯原文既吐且利手足逆冷者其常也若反發熱則陽氣似非衰憊然正恐真陽越出軀殼之外故反發熱耳設脈不至則當急溫無疑但溫藥必至傷陰故於少陰本穴用灸法以引其陽內返斯脈至而吐利亦將自止矣前條背惡寒之證灸後用附子湯者陰寒內凝定非一灸所能勝此條手足反熱止是陰內陽外故但灸本經以招之內入不必更用溫藥也絲絲入扣少陰病惡寒身踡而利手足逆冷者不治原文陰盛無陽即用四逆等法回陽氣於無何有之鄉其不能回者多矣故曰不治少陰病吐利煩躁四逆者死原文上吐下利因至煩躁則陰陽擾亂而竭絶可虞更加四肢逆冷是中州之土先敗上下交徵中氣立斷故主死也使早用溫中之法寧至此乎少陰病下利止而頭眩時時自冒者死原文下利既止其人似可得生乃頭眩時時自冒者復為死候蓋人身陰陽相為依附者也陰亡於下則諸陽之上聚於頭者紛然而動所以頭眩時時自冒陽脫於上而主死也可見陽回利止則生陰盡利止則死矣少陰病四逆惡寒而身踡脈不至不煩而躁者死原文四逆惡寒身踡更加脈不至陽已去矣陽去故不煩然尚可施種種回陽之法若其人復加躁擾則陰亦垂絶即欲回陽而基址已壞不能回也少陰病六七日息高者死原文諸陽主氣息高則真氣上迸於胸中本實先撥而不能復歸於氣海故主死也六七日三字辨證最細見六七日經傳少陰而息高與二三日太陽作喘之表證迥殊也少陰病脈微沉細但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死原文脈微沉細但欲臥少陰之本證也汗出不煩則陽證悉罷而當顧慮其陰矣乃於中兼帶欲吐一證欲吐明系陰邪上逆正當急溫之時失此不圖至五六日自利有加復煩躁不得臥寐非外邪至此轉增正少陰腎中之真陽擾亂頃刻奔散即溫之亦無及故主死也少陰經後篇凡少陰傳經熱邪正治之法悉列此篇少陰之為病脈微細但欲寐也原文陽脈滑大陰脈微細外邪傳入少陰其脈必微細而與三陽之滑大迥殊衛氣行陽則寐行陰則寐邪入少陰則氣行於陰不行於陽故但欲寐也此少陰之總脈總證也少陰病脈細沉數病為在裡不可發汗原文沉細之中加之以數正熱邪入里之徵熱邪入里即不可發汗發汗則動其經氣而有奪血亡陽之變故示戒也少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也原文少陰之脈從足入腹上循喉嚨縈繞舌根故多咽痛之證其支別出肺故間有咳證今以火氣強劫其汗則熱邪挾火力上攻必為咳以肺金惡火故也下攻必為利以火勢逼迫而走空竅故也內攻必譫語以火勢燔炳而亂神識故也小便必難者見三證皆妨小便蓋肺為火勢所傷則膀胱氣化不行大腸奔迫無度則水穀並趨一路心包燔灼不已則小腸枯涸必至耳少陰可強責其汗乎少陰中風陽微陰浮者為欲愈原文風邪傳入少陰仍見陽浮陰弱之脈則其勢方熾必陽脈反微陰脈反浮乃為欲愈蓋陽微則外邪不復內入陰浮則內邪盡從外出故欲愈也少陰傷寒之愈脈自可類推少陰病欲解時從子至寅上原文各經皆解於所王之時而少陰獨解於陽生之時陽進則陰退陽長則陰消正所謂陰得陽則解也即是推之而少陰所主在真陽不可識乎少陰病八九日一身手足盡熱者以熱在膀胱必便血也原文少陰病難於得熱熱則陰病見陽故前篇謂手足不逆冷反發熱者不死然病至八九日陰邪內解之時反一身手足盡熱則少陰必無此候當是藏邪傳府腎移熱於膀胱之證也以膀胱主表一身及手足正軀殼之表故爾盡熱也膀胱之血為少陰之熱所逼其出必趨二陰之竅以陰主降故也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上渴為難治原文強發少陰汗而動其血勢必逆行而上出陽竅以諸發汗藥皆陽經藥也或口鼻或耳目較前證血從陰竅出自則倍甚矣下厥者少陰居下不得汗而熱深也上竭者少陰之血盡從上而越竭也少陰本少血且從上逆故為難治然則上條不言難治者豈非以膀胱多血且從便出為順乎少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之原文心煩不得臥而無躁證則與真陽發動迥別蓋真陽發動必先陰氣四布為嘔為下利為四逆乃至煩而且躁魄汗不止耳今但心煩不臥而無嘔利四逆等證是其煩為陽煩乃真陰為邪熱煎熬如日中纖雲頃刻消散安能霾蔽青天也哉故以解熱生陰為主治始克有濟少緩則無及矣少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之原文腹痛小便不利少陰熱邪也而下利不止便膿血則下焦滑脫矣滑脫即不可用寒藥故取乾薑石脂之辛澀以散邪固脫而加糯米之甘以益中虛蓋治下必先中中氣不下墜則滑脫無源而自止也注家見用乾薑謂是寒邪傷胃欠清蓋熱邪挾少陰之氣填塞胃中故用乾薑之辛以散之若混指熱邪為寒邪寧不貽誤後人耶少陰病下利便膿血者桃花湯主之少陰病便膿血者可刺原文證兼下利便膿血則用桃花湯若不下利而但便膿血則可刺經穴以散其熱即上文之互意也少陰病下利咽痛胸滿心煩者豬膚湯主之原文下利咽痛胸滿心煩少陰熱邪充斥上下中間無所不到寒下之藥不可用矣又立豬膚湯一法以潤少陰之燥與用黑驢皮之意頗同若以為燖豬皮外毛根薄膚則蘞劣無力且與熬香之説不符但用外皮去其內層之肥白為是此藥大不可忽陽微者用附子溫經陰竭者用豬膚潤燥溫經潤燥中同具散邪之義比而觀之思過半矣少陰病二三日咽痛者可與甘草湯不差者與桔梗湯原文邪熱客於少陰故咽痛用甘草湯者和緩其勢也用桔梗湯者開提其邪也此在二三日他證未具故可用之若五六日則少陰之下利嘔逆諸證蜂起此法又未可用矣少陰病咽中痛半夏散及湯主之少陰病咽中傷生瘡不能語言聲不出者苦酒湯主之原文熱邪挾痰攻咽當用半夏滌飲桂枝散邪若劇者咽傷生瘡音聲不出桂枝之熱既不可用而陰邪上結復與寒下不宜故用半夏雞子以滌飲潤咽更有藉於苦酒之消腫斂瘡以勝陰熱也少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之原文傳經熱邪至於手足四逆最當辨悉若見咳利種種之證其為熱證無疑矣然雖四逆而不至於厥其熱未深故主此方為和解亦如少陽經之用小柴胡湯為一定之法矣讀者詳之少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之原文下利六七日本熱去寒起之時其人尚兼咳渴心煩不眠等證則是熱邪摶結水飲以故羈留不去用豬苓湯以利水潤燥不治利而利自止也少陰病得之二三日口燥咽乾者急下之宜大承氣湯原文得病才二三日即口燥咽乾則腎水之不足上供可知延至五六日始下必枯稿難回矣故宜急下以救腎水也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯原文熱邪傳入少陰逼迫津水注為自利質清而無渣滓相雜色青而無黃赤相間可見陽邪暴虐之極反與陰邪無異但陽邪傳自上焦其人心下必痛口必乾燥設系陰邪必心下滿而不痛口中和而不燥必無此枯稿之象故宜急下以救其陰也少陰病六七日腹脹不大便者急下之宜大承氣湯原文六七日腹脹不大便則胃土過實腎水不足以上供有立盡之勢又非少陰負膚陽反為順候之比此時下之已遲安得不急少陰負趺陽者為順也此條叔和編入厥陰今移附少陰少陰水也趺陽土也諸病惡土剋水而傷寒少陰見證惟恐土不能制水其水反得以泛溢水一泛溢則嘔吐下利無所不至究令中州土敗而真陽外越神丹莫救矣故豫其權於土則平成可幾豫其權於水則昏墊立至此脈法中消悉病情之奧旨也按少陰水藏也水居北方原自坎止惟挾外邪而動則波翻浪湧橫流逆射無所不到為嘔為咳為下利為四肢沉重仲景不顧外邪惟以真武一法坐鎮北方之水水不橫溢則諸證自止而人之命根賴以攸固命根者何即父母構精時一點真陽伏藏於腎水之中者是也水中火發所以其證雖陰其人反煩躁多汗而似陽仲景每用乾薑附子白通之法以收攝其陽初不慮夫外感蓋陽出則腠理大開外感先出所以一回陽而了無余義也若用寒涼以助水則真陽不返而命根斯斷矣其有腎水衰薄邪入不能橫溢轉而內挾真陽蘊祟為患外顯心煩舌燥咽痛不眠等證即不敢擅用汗下諸法以重傷其陰但用黃連阿膠湯苦酒湯豬苓湯豬膚湯四逆散之類以分解其熱而潤澤其枯於中雖有急下三證反無當下一證所以前方俱用重劑潤下一日三服始勝其任設熱邪不能盡解傳入厥陰則熱深者其厥亦深而咽痛者轉為喉痹嘔咳者轉吐癰膿下利者轉便膿血甚者發熱厥逆躁不得臥仍是腎氣先絶而死也必識此意然後知仲景溫經散邪之法與清熱潤燥之法微細直折與九轉還丹不異後人窺見一班者遇陰邪便亟溫遇陽邪便亟下其鹵莽滅裂尚不可勝言況於聾瞶之輩乎茲分前後二篇暢發其義有知我者諒不以為僭也尚論厥陰經證治大意厥陰雖兩經交盡之名然厥者逆也腎居極下逆行而上以傳於肝故名曰厥陰也邪傳厥陰其熱深矣熱深多發厥厥證皆屬於陽以陽與陰不相承接因致厥也厥後發熱陽邪出表則易愈厥多熱少則病進熱多厥少則病退所以仲景雜用三陽經治法即譫語之當下者但用小承氣湯微和胃氣他證皆不用下正欲其熱多而邪從外出耳然厥證多兼下利則陽熱變為陰寒者十居其七蓋木盛則胃土受克水穀奔迫胃陽發露能食則為除中木盛則腎水暗虧汲取無休腎陽發露面赤則為戴陽由是陽微則厥愈甚陽絶則厥不返矣所以溫之灸之以回其陽仍不出少陰之成法也但厥而下利陰陽之辨甚微不便分為二篇故發其奧於篇首俾讀者先會其意云厥陰經全篇法五十五厥陰之為病消渴氣上撞心心中疼熱飢而不欲食食則吐蛔下之利不止原文消渴者飲水多而小便少也厥陰屬木厥陰邪甚則腎水為之消腎消則引水以自救故消而且渴其渴不為水止也氣上撞心心中疼熱者肝氣通於心也飢不能食者木邪橫肆胃土受制也食則吐蛔者胃中飢蛔嗅食則出也下之利不止者邪屬厥陰下則徒虛陽明陽明虛木益乘其所勝也此條文義形容厥陰經之病情最著蓋子盛則母虛故腎水消而生渴母盛則子實故氣撞心而疼熱然足經之邪終與手經有別雖仰關而攻究不能入心之郛廓也至胃則受俯凌之勢無可逃避食則吐而下則利不止矣亦由邪自陽明傳入胃氣早空故易動耳厥陰中風脈微浮為欲愈不浮為未愈原文厥陰之脈微緩不浮中風病傳厥陰脈轉微浮則邪還於表而為欲愈厥陰病欲解時從醜至卯上原文醜寅卯厥陰風木之王時故病解厥陰病欲飲水者少少與之愈原文諸四逆厥者不可下之虛家亦然凡厥者陰陽氣不相順接便為厥厥者手足逆冷者是也原文厥即四逆之極陰陽既不相順接下則必至於脫絶也厥陰證仲景總不欲下無非欲邪還於表而陰從陽解也此但舉最不可下之二端以嚴其戒耳手之三陰與手之三陽相接於手足之三陰與足之三陽相接於足陰主寒陽主熱故陽氣內陷不與陰氣相順接則手足厥冷也然四肢屬脾脾為陰與胃之陽不相順接亦主逆冷所以厥證雖傳經熱邪復有不盡然者最難消悉傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死原文脈遲為寒寒則胃中之陽氣已薄不可更用寒藥矣腹中即胃中胃暖乃能納食今胃冷而反能食則是胃氣發露無餘其陽亦必漸去而不能久存故為必死除者去也與除夕之義同又除者授也與授鞶帶之義同傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食者恐為除中食以索餅不發熱者如胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也原文少陰經中內藏真陽最患四逆故云吐利手足不逆冷反發熱者不死厥陰經中內無真陽不患其厥但患不能發熱與夫熱少厥多耳論中恐暴熱來出而復去後三日脈之其熱尚在形容厥證重熱之意匠心滿志讀者不可草草然得熱與厥相應尤無後患若熱氣有餘病勢雖退其後必發癰膿以厥陰主血熱與血久持不散必至壅敗也傷寒先厥後發熱而利者必自止見厥復利傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹原文先厥後熱下利止其病為欲愈矣乃反汗出咽中痛是熱邪有餘上攻咽喉挾濕痰而為痹也然既發熱即無汗而邪亦外出所以利必自止若不止則無汗明系邪不外出仍在於里必主便膿血也便膿血者其喉不痹見熱邪在裡即不復在表在下即不復在上也傷寒一二日至四五日厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤原文前云諸四逆厥者不可下矣此云厥應下之者其辨甚微蓋先四逆而後厥與先發熱而後厥者其來迥異故彼云不可下此云應下之也以其熱深厥深當用苦寒之藥清解其在裡之熱即名為下如下利譫語但用小承氣湯止耳從未聞有峻下之法也若不用苦寒反用辛甘發汗寧不引熱勢上攻乎口傷爛赤與喉痹互意傷寒病厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈原文厥終不過五日即上句之注腳見熱與厥相應陰陽一勝一復恰恰相當故可勿藥自愈傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為藏厥非蛔厥也蛔厥者其人當吐蛔今病者靜而復時煩者此為藏寒蛔上入其膈故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之又主久利原文此條微旨千百年來全無識者昌於篇首總括大意挈出腎陽胃陽二端原有所自藏厥者正指腎而言也蛔厥者正指胃而言也曰脈微而厥則陽氣衰微可知然未定其為藏厥蛔厥也惟膚冷而躁無暫安乃為藏厥藏厥用四逆及灸法其厥不回者主死若蛔厥則時煩時止未為死候但因此而馴至胃中無陽則死也烏梅丸中酸苦辛溫互用以安蛔溫胃益虛久利而便膿血亦主此者能解陰陽錯雜之邪故也傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便血原文熱少厥微指頭微寒其候原不重然默默不欲食煩躁數日胃中津液傷而坐困矣若小便利色白則胃熱暗除故欲得食若厥而嘔胸脅滿不去則邪聚中焦其後陰邪必走下竅而便血以厥陰主血也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四至七日熱不去者必便膿血傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也原文以陰陽進退之義互舉其旨躍然傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死原文脈微而厥更加煩躁則是陽微陰盛用灸法以通其陽而陽不回則死也傷寒發熱下利厥逆躁不得臥者死原文傷寒發熱下利至甚厥不止者死原文厥證但發熱則不死以發熱則邪出於表而里證自除下利自止也若反下利厥逆煩躁有加則其發熱又為陽氣外散之候陰陽兩絶亦主死也發熱而厥七日下利者為難治原文厥利與熱不兩存之勢也發熱而厥七日是熱者自熱厥利者自厥利兩造其偏漫無相協之期故雖未現煩躁等證而已為難治蓋治其熱則愈厥愈利治其厥利則愈熱不至陰陽兩絶不止矣傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也原文六七日不利忽發熱而利渾是外陽內陰之象此中伏有亡陽危機所以仲景蚤為回護用溫用灸以安其陽若俟汗出不止乃始圖之則無及矣可見邪亂厥陰其死生全關乎少陰也不然厥陰之熱深厥深何反謂之有陰無陽哉病者手足厥冷言我不結胸小腹滿按之痛者此冷結在膀胱關元也原文陽邪必結於陽陰邪必結於陰故手足逆冷腹滿按之痛者邪不上結於胸其非陽邪可知其為陰邪下結可知則其當用溫用灸更可知矣關元在臍下三寸為極陰之位也傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死原文濡音軟傷寒五六日邪入厥陰其熱深矣乃陽邪不上結於胸陰邪不下結於腹其脈虛而復厥則非熱深當下之比由其陰血素虧若誤下之以重亡其陰必主死也此厥陰所以無大下之法而血虛之人尤以下為大戒矣手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者宜當歸四逆加吳茱萸生薑湯主之原文前條之脈虛此條之脈細互見其義虛細總為無血不但不可用下並不可用溫蓋脈之虛細本是陽氣衰微然陰血更為不足故藥中宜用歸芍以濟其陰不宜用薑附以劫其陰也即其人素有久寒者但增吳茱萸生薑觀之是則乾薑附子寧不在所禁乎此而推之妙義天開矣大汗出熱不去內拘急四肢疼又下利厥逆而惡寒者四逆湯主之原文大汗出而熱反不去正恐陽氣越出軀殼之外若內拘急四肢疼更加下利厥逆惡寒則在裡純是陰寒宜亟用四逆湯以回其陽而陰邪自散耳大汗若大下利而厥冷者四逆湯主之原文此證較上條無外熱相錯其為陰寒易明然既云大汗大下利則陰津亦亡但此際不得不以救陽為急俟陽回尚可徐救其陰所以不當牽制也傷寒脈促手足厥逆者可灸之原文傷寒脈促則陽氣局蹐可知更加手足厥逆其陽必為陰所格拒而不能返故宜灸以通其陽也傷寒脈滑而厥者里有熱也白虎湯主之原文滑為陽脈其裡熱熾盛可知故宜行白虎湯以解其熱與三陽之治不殊也病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢不能食者病在胸中當須吐之宜瓜蒂散原文手足厥冷疑似陰邪其脈有時乍緊則是陽邪而見陽脈也陽邪必結於陽所以邪結在胸中心下煩滿飢不能食也此與太陽之結胸迥殊其脈乍緊其邪亦必乍結故用瓜蒂散湧載其邪而出斯陽邪仍從陽解耳傷寒厥而心下悸者宜先治水當用茯苓甘草湯卻治其厥不爾水漬入胃必作利也原文太陽篇中飲水多者心下必悸故此厥而必悸者明系飲水所致所以乘其水未漬胃先用茯苓甘草湯治水以清下利之源後乃治厥庶不致厥與利相因耳傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利唾膿血泄利不止者為難治麻黃升麻湯主之原文此表裡錯雜之邪最為難治然非死證也大下後寸脈沉而遲手足厥逆則陽氣陷入陰中下部脈不至則陰氣亦復衰竭咽喉不利唾膿血又因大下傷其津液而成肺痿金匱曰肺痿得之被快藥下利重亡津液者是也泄利不止未是下焦虛脫但因陽氣下陷所致故必升舉藥中兼調肝肺乃克有濟此麻黃升麻所以名湯而謂汗出愈也按寸脈沉而遲明是陽去入陰之故非陽氣衰微可擬故雖手足厥逆下部脈不至泄利不止其不得為純陰無陽可知況咽喉不利唾膿血又陽邪摶陰上逆之徵驗所以仲景特於陰中提出其陽得汗出而錯雜之邪盡解也傷寒四五日腹中痛若轉氣下趨少腹者此欲自利也原文腹中痛多屬虛寒與腹中實滿不同若便轉氣下趨少腹則必因腹寒而致下利明眼見此自當圖功於未著矣傷寒本自寒下醫復吐下之寒格更逆吐下若食入口即吐乾薑黃連黃芩人參湯主之原文本自寒下是其人之平素胃寒下利也較上條之轉氣下趨少腹者更為已然之事矣所以才病傷寒即不可妄行吐下與病人舊微溏不可服梔子湯互意舊微溏而用梔子則易湧易泄本自寒下而施吐下則吐下更逆其理甚明注家不會其意寒格者因誤施吐下之寒藥致成格拒也若食入口即吐格拒極矣故用乾薑人參以溫補其胃用黃連黃芩之苦以下逆氣而解入里之熱邪也下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也原文下利脈沉遲裡寒也面少赤有微熱則仍兼外邪必從汗解但戴陽之證必見微厥汗中大伏危機其用法即迥異常法下條正其法也下利清穀裡寒外熱汗出而厥者通脈四逆湯主之原文上條辨證此條用藥兩相互發然不但此也少陰病下利清穀面色赤者已用其法矣要知通之正所以收之也不然豈有汗出而反加蔥之理哉下利手足厥冷無脈者灸之不溫若脈不還反微喘者死原文灸之不溫脈不還已為死證然或根柢未絶亦未可知設陽氣隨火氣上逆胸有微喘則孤陽上脫而必死矣與少陰病六七日息高者死正同下利後脈絶手足厥冷晬時脈還手足溫者生脈不還者死原文厥利無脈陽去而難於返矣然在根本堅固者生機尚存一線經一周時脈還手足復溫則生否則死矣此即互上條用灸之意所以不重贅灸法也少陰下利厥逆無脈服白通湯脈暴出者死微續者生厥陰下利厥逆脈絶用灸法晬時脈還者生不還者死可見求陽氣者非泛然求之無何有之鄉也根深寧極之中必有幾微可續然後借溫灸為鸞膠耳下利腹脹滿身體疼痛者先溫其里乃攻其表溫里宜四逆湯攻表宜桂枝湯原文此與太陽中篇下利身疼用先里後表之法大同彼因誤下而致下利此因下利而致腹脹總以溫里為急者見睍曰消之義也身疼痛有里有表必清便已調其痛仍不減方屬於表太陽條中已悉故此不贅下利清穀不可攻表汗出必脹滿原文此條重舉下利清穀不可攻表以示戒正互明上條所以必先溫里然後攻表之義也見誤攻其汗則陽出而陰氣彌塞胸腹必致脹滿而釀變耳傷寒下利日十餘行脈反實者死原文實為邪盛邪盛必正脫也下利有微熱而渴脈弱者今自愈下利脈數而渴者今自愈設不差必清膿血以有熱故也下利脈數有微熱汗出今自愈設復緊為未解原文微熱而渴證已轉陽然正恐陽邪未盡也若脈弱則陽邪已退可知故不治自愈脈數與微熱互意汗出與脈弱互意脈緊則不弱矣邪方熾盛其不能得汗又可知矣下利寸脈反浮數尺中自澀者必圊膿血原文清圊同義脈見浮數若是邪還於表則尺脈自和今尺中自澀乃熱邪摶結於陰分雖寸口得陽脈究竟陰邪必走下竅而便膿血也下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死原文下利而脈沉弦主裡急後重成滯下之證即所稱痢證也脈大者即沉弦中之大脈微弱數者即沉弦中之微弱數也脈微弱數雖發熱不死則脈大身熱者其死可知矣熱利下重者白頭翁湯主之原文熱利下重互上文即傷寒轉痢之謂也下利欲飲水者以有熱故也白頭翁湯主之原文此從上條另申一義見凡下利欲飲水者與藏寒利而不渴自殊乃熱邪內耗津液縱未顯下重之候亦當以前湯勝其熱矣下利譫語以有燥屎也宜小承氣湯原文此與陽明經譫語胃中有燥屎正同乃不用大承氣而用小承氣者以下利腸虛兼之厥陰藏寒所以但用小承氣微攻其胃全無大下之條耳下利後更煩按之心下濡者為虛煩也宜梔子豉湯原文已下利而更煩似乎邪未盡解然心下濡而不滿則為虛煩與陽明誤下胃虛膈熱之證頗同故俱用湧法也嘔而發熱者小柴胡湯主之原文厥陰之邪上逆而兼發熱乃肝膽藏府相連之證也故用小柴胡湯分散其陰藏陽府之嘔熱也嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之原文嘔而脈弱小便利裡虛且寒身有微熱證兼表裡其人見厥則陰陽互錯故為難治然不難於外熱而難於內寒也內寒則陽微陰盛天日易霾故當用四逆湯以回陽而微熱在所不計也況乾薑配附子補中有發微熱得之自除耶乾嘔吐涎沫者吳茱萸湯主之嘔家有癰膿者不可治嘔膿儘自愈原文厥陰之邪上逆而乾嘔吐涎沫可用吳茱萸湯以下其逆氣若陰邪上逆結而為癰潰出膿血即不可復治其嘔正恐人誤以吳茱萸湯治之耳識此意者用辛涼以開提其膿亦何不可耶按厥陰篇中次第不一有純陽無陰之證有陰陽差多差少之證有陽進欲愈陰進未愈之證復有陰居八九陽居一二之證厥而發熱熱深厥深上攻而成喉痹下攻而便膿血此純陽無陰之證也脈微細欲絶厥冷灸之不溫惡寒大汗大利躁不得臥與夫冷結關元此純陰無陽之證也厥三日熱亦三日厥五日熱亦五日手足厥冷而邪熱在胸水熱在胃此陰陽差多差少之證也渴欲飲水飢欲得食脈滑而數手足自溫此陽進欲愈之證也默默不欲食寸脈雖浮數尺脈自澀嘔吐涎沫腹脹身疼此陰進未愈之證也下利清穀裡寒外熱嘔而脈弱小便復利本自寒下復誤吐下脈沉微厥面反戴陽此陰居八九陽居一二之證也大率陽脈陽證當取用三陽經治法陰脈陰證當合用少陰經治法厥陰病見陽為易愈見陰證為難痊其表裡雜錯不分又必先溫其里後攻其表設見咽喉不利咳唾膿血則溫法不可用仍宜先解其表矣世醫遇厥陰諸證如涉大洋茫無邊際可測是以動手即錯茲不厭繁復闡其要旨俾後學奉為指南云再按厥陰經原無下法首條即先示戒云下之利不止矣蓋厥陰多至下利下利中復有死證金匱云五藏氣絶於內則下利不禁此所以致戒不可下耶中間雖有用小承氣湯一法因胃有燥屎微攻其胃非攻其腸也雖有厥應下之一語乃對發汗而言謂厥應內解其熱不應外發其汗耳豈可泥應下二字遂犯厥陰之大戒耶自晉迄今傷寒失傳遇陽明二三日內當下之證及少陰二三日急下之證總不能下至厥陰六七日不當下之時反行下之在熱深厥深之陽證下之已遲萬一僥幸不過為焦頭爛額之客在亡血藏虛之人下之百無一生矣幾千年來孰任殺人之辜耶過經不解法四條附三陰經後過經不解者由七八日已後至十三日已後病過一候二候猶不痊解也然邪在身中日久勢必結聚於三陽太陽為多少陽次之陽明又次之及至三陰則生死反掌不若此之久持矣辨原缺九字陽用大小柴胡兩解一法太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱郁微煩者為未解也與大柴胡湯下之則愈原文過經十餘日而不知太陽證有未罷反二三下之因而致變者多矣後四五日柴胡證仍在未有他變本當行大柴胡兩解表裡但其人之邪屢因誤下而深入即非大柴胡下法所能服故必先用小柴胡提其邪出半表然後乃用大柴胡始合法也辨過經不解心下欲吐微煩微滿用藥宜審一法太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱郁微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡湯證以嘔故知極吐下也原文此條注解不得仲景叮嚀之意茲特明之太陽病過經十餘日心下溫溫欲吐而不吐其人胸中痛大便反溏腹微滿鬱郁微煩者此有二辨若曾經大吐大下者邪從吐解且已入里可用調胃承氣之法若未極吐下但欲嘔不嘔胸中痛微溏者是痛非吐所傷溏非下所致調胃之法不可用矣豈但調胃不可用即柴胡亦不可用以邪尚在太陽高位徒治陽明少陽而邪不服耳解太陽之邪仲景言之已悉故此但示其意也若其人能嘔則是為吐下所傷而所主又不在太陽矣過經證屬可下誤用丸藥增利辨內實內虛二法傷寒十三日胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先宜小柴胡以解外後以柴胡加芒硝湯主之原文胸脅滿而嘔邪在少陽表裡之間也發潮熱里可攻也微下利便未硬也以大柴胡分解表邪蕩滌裡熱則邪去而微利亦自止矣若誤用丸藥則徒引熱邪內陷而下利表裡俱不解也故先用小柴胡分提以解外邪後加芒硝以滌胃中之熱也傷寒十三日不解過經譫語者以有熱也當以湯下之若小便利者大便當硬而反下利脈調和者知醫以丸藥下之非其治也若自下利者脈當微厥今反和者此為內實也調胃承氣湯主之原文二條俱見微利之證難辨其內虛內實上條胸脅滿而嘔邪湊少陽之表故欲下之必用柴胡湯為合法若以他藥下之表邪內入即是內虛此條原無表證雖丸藥誤下其脈仍和即為內實也按仲景下法屢以用丸藥為戒惟治太陽之脾約乃用麻仁丸因其人平素津枯腸結必俟邪入陽明下之恐無救於津液故雖邪在太陽即用丸藥之緩下潤其腸俾外邪不因峻攻而內陷乃批郗導竅遊刃空虛之妙也此等處亦須互察再按傷寒證以七日為一候其有二候三候不解者病邪多在三陽經留戀不但七日傳之不盡即十日十三日二十餘日尚有傳之不盡者若不辨證徒屈指數經數候汗下展轉差誤正虛邪湊愈久愈難為力與內經至七日太陽病衰頭痛少愈八日陽明病衰身熱少歇九日少陽病衰耳聾微聞十日太陽病衰腹減如故則思飲食十一日少陰病衰渴止舌潤而嚏十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧之恆期迥異矣所以過經不解當辨其邪在何經而取之仲景云太陽病頭痛至七日以上自愈者以行其經盡故也即內經七日太陽病衰頭痛少愈之旨也可見太陽一經有行之七日以上者矣其欲作再經者針足陽明使經不傳則愈以太陽既羈留多日則陽明少陽亦可羈留過經漫無解期矣所以早從陽明中土而奪之俾其不傳此捷法也若謂六經傳盡復傳太陽必無是理後人墮落成無己阱中耳豈有厥陰兩陰交盡於裡復從皮毛外再入太陽之事耶請破此大惑差後勞復陰陽易病大病差後勞復者枳實梔子豉湯主之若有宿食者加大黃如博棋子大五六枚原文勞復乃起居作勞復生餘熱之病方注作女勞復大謬女勞復者自犯傷寒後之大戒多死少生豈有反用上湧下泄之理耶太陽中篇下後身熱或汗吐下後虛煩無奈用本湯之苦以吐徹其邪此非取吐法也乃用苦以發其微汗正內經火淫所勝以苦發之之義觀方中用清漿水七升空煮至四升然後入藥同煮全是欲其水之熟而趨下不至上湧耳所以又云復令微似汗精絶傷寒差已後更發熱者小柴胡湯主之脈浮者以汗解之脈沉實者以下解之原文差已後更發熱乃餘熱在內以熱召熱也然餘熱要當辨其何在不可泛然施治以虛其虛如在半表半裡則仍用小柴胡湯和解之法如在表則仍用汗法如在裡則仍用下法然汗下之法即互上條汗用枳實梔豉微汗下用枳實梔豉加大黃微下也大病差後從腰已下有水氣者牡蠣澤瀉散主之原文腰以下有水氣者水漬為腫也金匱曰腰以下腫當利小便此定法矣乃大病後脾土告困不能攝水以致水氣泛溢用牡蠣澤瀉散峻攻何反不顧其虛耶正因水勢未犯身半以上急驅其水所全甚大設用輕劑則陰水必襲入陽界驅之無及誠不沒者三版亦云幸矣可見活人之事迂疏輩必不能動中機宜庸工遇大病後悉行溫補自以為善孰知其為鹵莽滅裂哉大病差後喜唾久不了了者胸上有寒當以丸藥溫之宜理中丸原文身中津液因胃寒凝結而成濁唾久而不清其人必消瘦索澤故不用湯藥蕩滌而用丸藥緩圖也理中丸乃區分陰陽溫補脾胃之善藥然仲景差後病外邪已盡才用其方在太陽邪熾之日不得已合桂枝用之即更其名曰桂枝人參湯又云醫以理中與之利益甚理中者理中焦此利在下焦非其治也於此見用法之權衡矣傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之原文身中津液為熱邪所耗餘熱不清必致虛羸少氣難於康復若更氣逆欲吐是餘邪復挾津液滋擾故用竹葉石膏湯以益虛清熱散逆氣也病人脈已解而日暮微煩以病新差人強與谷脾胃氣尚弱不能消穀故令微煩損谷則愈原文脈已解者陰陽和適其無表裡之邪可知也日暮微煩者日中衛氣行陽其不煩可知也乃因脾胃氣弱不能消穀所致損谷則脾胃漸趨於旺而自愈矣注家牽扯日暮為陽明之王時故以損谷為當小下不知此論差後之證非論六經轉陽明之證也日暮即內經日西而陽氣已衰之意所以不能消穀也損谷當是減損穀食以休養脾胃不可引前條宿食例輕用大黃重傷脾胃也合六條觀之差後病凡用汗下和溫之法但師其意不泥其方恐元氣精津久耗不能勝藥耳豈但不能勝藥抑且不能勝谷故損谷則病愈而用藥當思減損並可識矣其腰已下有水氣峻攻其水亦以病後體虛膀胱氣化不行若不一朝迅掃則久困之脾土必不能堤防水逆不至滔天不止所以仲景云少陰負趺陽者為順故急奪少陰之水以解趺陽之圍夫豈尋常所能測識耶傷寒陰陽易之為病其人身體重少氣少腹裡急或引陰中拘攣熱上衝胸頭重不欲舉眼中生花膝胚拘急者燒褌散主之原文陰陽易之病注家不明言乃至後人指為女勞復大謬若然則婦人病新差與男子交為男勞復乎蓋病傷寒之人熱毒藏於氣血中者漸從表裡解散惟熱毒藏於精髓之中者無由發泄故差後與不病之體交接男病傳不病之女女病傳不病之男所以名為陰陽易即交易之義也其證眼中生花身重拘急少腹痛引陰筋暴受陰毒又非薑桂附子辛熱所能驅故燒褌襠為散以其人平昔所出之敗濁同氣相求服之小便得利陰頭微腫陰毒乃從陰竅出耳此條叔和匯於差後勞復之前因起後人女勞復之疑今移附勞復後益見熱病之為大病差後貽毒他人其惡而可畏有如此也尚論張仲景傷寒論凡八卷前四卷詳論六經證治已盡傷寒之義矣後四卷推廣春月溫病夏秋暑濕熱病以及脈法諸方聊與二三及門揚確千古稿藏笥中欲俟百年身盡名滅然後梓行以其刻意求明今天下業醫之子從前師説漫無著落必反嫉為欺世盜名耳不謂四方來學日衆手編不便抄録姑將前四卷授梓求正大方倘坊間購刻全本人書具在寧致貽憾於續貂乎庚寅初夏喻昌識
