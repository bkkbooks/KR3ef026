body:
  text: 尚論篇卷首尚論張仲景傷寒論大意後漢張仲景著卒病傷寒論十六卷當世兆民賴以生全傳之後世如日月之光華旦而復旦萬古常明可也斯民不幸至晉代不過兩朝相隔其卒病論六卷已不可復睹即傷寒論十卷想亦劫火之餘僅得之讀者之口授故其篇目先後差錯賴有三百九十七法一百一十三方之名目可為校正太醫令王叔和附以己意編集成書共二十二篇後人德之稱為仲景之徒究竟述者之明不及作者之聖祗令學者童而習之白首不得其解雖有英賢輩出卒莫能捨叔和疆畛追溯仲景淵源於是偶窺一班者各鳴一得如龐安常朱肱許叔微韓祇和王實之流非不互有闡發然不過為叔和之功臣止耳未見為仲景之功臣也今世傳仲景傷寒論乃宋祕閣臣林億所校正宋人成無己所詮注之書也林億不辨朱紫菽粟謂自仲景於今八百餘年惟王叔和能學之其間如葛洪陶弘景胡洽徐之才孫思邈輩皆不及也又傳稱成無己注傷寒論十卷深得長沙公之祕旨殊不知林成二家過於尊信叔和往往先傳後經將叔和緯翼仲景之辭且混編為仲景之書況其他乎如一卷之平脈法二卷之序例其文原不雅馴反首列之以錯亂聖言則其所為校正所為詮注者乃仲景之不幸斯道之大厄也元泰定間程德齋作傷寒鈐法尤多不經國朝王履並三百九十七法一百一十三方亦竊疑之謂仲景書甚平易明白本無深僻但王叔和雜以己意遂使客反勝主而仲景所以創法之意淪晦不明今欲以傷寒例居前六經病次之類傷寒病又次之至若雜病雜脈雜論與傷寒無預者皆略去計得二百八十三條並以治字易法字而曰二百八十三治雖有深心漫無卓識亦何足取萬曆間方有執著傷寒條辨始先即削去叔和序例大得尊經之旨然未免失之過激不若愛禮存羊取而駁正之是非既定功罪自明也其於太陽三篇改叔和之舊以風寒之傷營衛者分屬卓識超越前人此外不達立言之旨者尚多大率千有餘年若明若昧之書欲取而尚論之如日月之光昭宇宙必先振舉其大綱然後詳明其節目始為至當不易之規誠以冬春夏秋時之四序也冬傷於寒春傷於溫夏秋傷於暑熱者四序中主病之大綱也舉三百九十七法分隸於大綱之下然後仲景之書始為全書其冬傷於寒一門仲景立法獨詳於春夏秋三時者蓋以春夏秋時令雖有不同其受外感則一自可取治傷寒之法錯綜用之耳仲景自序云學者若能尋余所集思過半矣可見引伸觸類治百病有餘能況同一外感乎是春夏秋之傷溫傷熱明以冬月傷寒為大綱矣至傷寒六經中又以太陽一經為大綱而太陽經中又以風傷衛寒傷營風寒兩傷營衛為大綱向也大綱混於節目之中無可尋繹只覺其書之殘缺難讀今大綱既定然後詳求其節目始知仲景書中矩則森森毋論法之中更有法即方之中亦更有法通身手眼始得一一點出讀之而心開識朗不復為從前之師説所爚浸假繇其道而升堂入室仲景彌光而吾生大慰矣知我罪我亦何計哉尚論仲景傷寒論先辨叔和編次之失嘗觀王叔和彙集扁鵲仲景華元化先哲脈法為一書名曰脈經其於仲景傷寒論尤加探討宜乎顯微畢貫曲暢創法制方之本旨以啓後人之信從可也乃於匯脈之中間一匯證不該不貫猶曰匯書之常也至於編述傷寒全書苟簡粗率仍非作者本意則吾不知之矣如始先序例一篇蔓引贅辭其後可與不可諸篇獨遺精髓平脈一篇妄入己見總之碎剪美錦綴以敗絮盲瞽後世無由復睹黼黻之華泥於編述大意私淑原委自首至尾不敘一語明是賈人居奇之術致令黃岐一脈斬絶無遺悠悠忽忽沿習至今所謂千古疑城莫此難破茲欲直溯仲景全神不得不先勘破叔和如太陽經中證緒分頭後學已難入手乃更插入溫病合病並病少陽病過經不解病坐令讀者茫然壁諸五穀雖為食寶設不各為區別一概混種混收鮮不貽耕者食者之困矣如陽明經中漫次仲景偶舉問答一端隸於篇首綱領倒置先後差錯且無扼要至於春溫夏熱之證當另立大綱顓自名篇者乃懵然不識此等大關一差則冬傷於寒春傷於溫夏秋傷於暑熱之旨盡晦至後人誤以冬月之方施於春夏而歸咎古方之不可以治今病者誰之過歟至於霍亂病陰陽易差後勞復等證不過條目中事耳乃另立篇名與六經並峙又何輕所重而重所輕耶仲景之道人但知得叔和而明孰知其因叔和而墜也哉尚論仲景傷寒論先辨林億成無己校注之失王叔和於仲景書不察大意妄行編次補綴尚存闕疑一線觀其篇首之辭謂痙濕暍雖同為太陽經病以為宜應別論者其一徵也觀其篇中謂疾病至急倉卒尋按要旨難得故重集可與不可方治者其一徵也觀其篇末補綴脈法分為二篇上篇仍仲景之舊下篇托仲景以傳猶未至於顛倒大亂者其一徵也第其不露補綴之痕反以平脈本名易為辨脈而陰行一字之顛倒此吾所為譏其僭竊耳若夫林億之校正成無己之詮注則以脈法為第一卷矣按仲景自敘云平脈辨證為傷寒卒病論合十六卷則脈法洵當隸於篇首但晉承漢統仲景遺書未湮叔和補綴之言不敢混入姑附於後不為無見二家不察竟移編篇首此後羚羊挂角無迹可求詎能辨其孰為仲景孰為叔和乎然猶隱而難識也其序例一篇明系叔和所撰何乃列於第二卷豈以仲景之書非序例不能明耶即使言之無弊亦無先傳後經之理況其蔓引贅辭橫插異氣寸瑜尺瑕何所見而崇信若是致令後學畫蛇添足買櫝還珠煌煌聖言千古無色是二家羽翼叔和以成名比以長君逢君無所逃矣至其注釋之差十居六七夫先已視神髓為糟粕矣更安望闡發精理乎駁正王叔和序例王叔和序例傳習已久中人已深欲削去之而坊刻盛行難掩衆目姑存原文駁正其失以定所宗非故攻擊前賢實不得已之思耳陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時之氣皆能為病以傷寒為毒者以其最成殺厲之氣也引用內經足見大意然入一毒字便開過端中而即病者名曰傷寒不即病者寒毒藏於肌膚寒邪由肌膚而入辛苦之人邪藏肌膚則有之若膏粱輩冬不藏精者其寒邪且有藏於骨髓者矣是未可以一端定也至春變為溫病變字下得怪誕駭人設謂春氣既轉為溫則病發不當名傷寒當變其名為溫病則正矣至夏變為暑病此一語尤為無據蓋暑病乃夏月新受之病豈有冬月伏寒春時不發至夏始發之理乎設謂夏氣既轉為熱外邪當變名為熱病則正矣暑病者熱極重於溫也此一語更添蛇足設有冬時伏寒至春不發其邪本輕可知豈有反重於溫之理乎其誤始於楊操是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也內經但言冬傷於寒春必病溫未嘗言夏必病暑也但言夏傷於暑秋必痎瘧未嘗牽引冬春也其意蓋謂春月之病始於冬秋月之病始於夏耳此等關頭不徹故以溫熱病並舉故謂暑重於溫凡時行者春時應暖而反大寒夏時應熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也未明傷寒先明異氣借客形主似無不可但傷寒要領全不挈出通篇有客無主殊不可耳大欲候知四時正氣為病及時行疫氣之法皆當按鬥歷占之九月霜降後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以冰雪解而為雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便涼從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章漫衍己意明異氣之輕重不同於仲景之文無涉況復所言紕繆證如後章其意指篇後溫瘧風溫溫毒溫疫為言此無識之最者也然後來諸家偏奉之為祖詎非得所託而傳信耶真紫之奪朱鄭聲之亂雅樂矣詳辨附序例後從立春節後其中無暴大寒又不冰雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病於字費解到底説變為溫病直是詖淫生心從春分以後至秋分節前天有暴寒者皆為時行寒疫也此正春溫夏暑秋熱三氣主病之時何乃全不序及反重衍夏秋之異氣攪亂經常豈以三時原無正氣主病乎抑仲景論中原無綱領可求乎可見醫事自晉代已失所宗何況今日哉三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳以陽氣為暴寒所折而分病熱之輕重前云暑病重於溫以此左見耳叔和未嘗序明溫暑病也茲云異氣病與溫暑病相似但治有殊然則溫暑病將何似耶將何治耶疏漏多矣十五日得一氣於四時之中一時有六氣四六名為二十四氣也然氣候亦有應至而不至或有未應至而至者或有至而太過者皆成病氣也但天地動靜陰陽鼓擊者各正一氣耳是以彼春之暖為夏之暑彼秋之忿為冬之怒蔓衍內經不見大意是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也此復姤二卦之義引入序例不切斯則冬夏二至陰陽合也春秋二分陰陽離也此分至之義內經謂至則氣同分則氣異何等明顯才換合離二字便自駭觀陰陽交易人變病焉內經謂陰陽相錯而變由生也何等圓活才換交易變病等字便費解此變溫變暑所自來乎此君子春夏養陽秋冬養陰順天之剛柔也內經謂養陽以涼以寒養陰以溫以熱所以然者從其根故也妙義合為疏出小人觸冒必嬰暴疹須知毒烈之氣留在何經而發何病詳而取之前云寒毒藏於肌膚此云不知留在何經而發何病非故自相矛盾其意實為溫瘧風溫溫毒溫疫作開山祖師也後人孰辨其為一場懵憧乎是以春傷於風夏必飧泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫此必然之道可不審明之此傷於四時之正氣而為病者但內經先言冬傷於寒春必病溫乃至傷風傷暑以次遞及見春夏秋三時之病多始於冬秋冬二時之病多始於夏耳然飧泄與咳嗽兼涉內因惟傷寒傷溫傷暑方是外感之正仲景會此意故以傷寒立論而苞舉溫暑在內如絲入扣始非不知而作若叔和引經止以春夏秋冬為序渾與流俗之見無別矣此歧路之紛趨所由來者遠也傷寒之病逐日淺深以施方治今世人傷寒或始不早治或治不對病或日數久淹困乃告醫醫人又不依次第而治之則不中病皆宜臨時消息制方無不效也今搜採仲景舊論録其證候診脈聲色對病真方有神驗者擬防世急也仲景之書叔和但言搜採其非寤寐神遊可知所以不窺作者之原漫無表章之實孰謂叔和為仲景之徒耶又土地溫涼高下不同物性剛柔餐居亦異是故黃帝興四方之問岐伯舉四治之能以訓後賢開其未悟者臨病之工宜須兩審也仲景於黃岐之道以述為作另闢手眼叔和凡引內經之文皆非典要安能發明其什一凡傷於寒則為病熱熱雖甚不死若兩感於寒而病者必死尺寸俱浮者太陽受病也當一二日發以其脈上連風府故頭項痛腰脊強尺寸俱長者陽明受病也當二三日發以其脈挾鼻絡於目故身熱目疼鼻乾不得臥尺寸俱弦者少陽受病也當三四日發以其脈循脅絡於耳故胸脅痛而耳聾此三經皆受病未入於府者可汗而已尺寸俱沉細者太陰受病也當四五日發以其脈布胃中絡於嗌故腹滿而嗌乾尺寸俱沉者少陰受病也當五六日發以其脈貫腎絡於肺系舌本故口燥舌乾而渴尺寸俱微緩者厥陰受病也當六七日發以其脈循陰器絡於肝故煩滿而囊縮此三經皆受病已入於府可下而已入府未入府少變內經入藏原文此處卻精若兩感於寒者一日太陽受之即與少陰俱病則頭痛口乾煩滿而渴二日陽明受之即與太陰俱病則腹滿身熱不欲食讝語三日少陽受之即與厥陰俱病則耳聾囊縮而厥水漿不入不知人者六日死若三陰三陽五藏六府皆受病則營衛不行府藏不通則死矣其得病陰陽兩證俱見其傳經亦陰陽兩經俱傳則邪氣彌滿充斥法當三日主死然必水漿不入不知人者方為營衛不行腑臟不通更越三日而陽明之經脈始絶也引內經微旨序兩感病甚精其不兩感於寒更不傳經不加異氣者至七日太陽病衰頭痛少愈也八日陽明病衰身熱少歇也九日少陽病衰耳聾微聞也十日太陽病衰腹減如故則思飲食十一日少陰病衰渴止舌乾幹當作潤已而嚏也十二日厥陰病衰囊縱少腹微下大氣皆去病人精神爽慧也自凡傷於寒則為病熱至此皆內經熱論篇原文叔和但增更不傳經八個字便有許多牽強若過十三日以上不間尺寸陷者大危尺寸之脈深陷正氣衰微莫能載邪外出既已通經其病不間誠為危候若更感異氣變為他病者當依舊壞證病而治之仲景於壞證全不立法其太陽經之壞證知犯何逆原用大陽經本法治之其少陽經之壞證知犯何逆原用少陽經本法治之豈有更加異氣可雜用太少二經諸法治之之理觀此則叔和漫不知壞證作何解乃教後人遵用其法所謂一盲引衆盲相將入火坑也悲哉若脈陰陽俱盛重感於寒者變為溫瘧陽脈浮滑陰脈濡弱者更遇於風變為風溫陽脈洪數陰脈實大者更遇溫熱變為溫毒溫毒為病最重也陽脈濡弱陰脈弦緊者更遇溫氣變為溫疫以此冬傷於寒發為溫病脈之變證方治如法叔和每序傷寒必插入異氣欲鳴己得也及序異氣則借意難經自作聰明漫擬四變疑鬼疑神駸成妖妄難經雖云傷寒有五其脈有變否變者辨也辨脈定證也設使叔和稍為平易但云冬傷於寒至春重感於寒其脈陰陽俱盛者名為溫瘧冬傷於寒至春更遇於風其脈陽浮滑陰濡弱者名為風溫乃至溫毒溫疫俱順理立説則雖擬病失倫而大關不害為正其如叔和未肯平易何後世但知叔和為傷寒論作序例不識其草澤姦雄稱孤道寡故有晉以後之談醫者皆偽統也今移論春溫大意並論溫疫大意二篇附序例後其詳載在春溫卷中凡人有疾不時即治隱忍冀差以成錮疾小兒女子益以滋甚時氣不和便當早言尋其邪由及在腠理以時治之罕有不愈者患人忍之數日乃説邪氣入藏則難可制此為家有患備慮之要凡作湯藥不可避晨夜覺病須臾即宜便治不等早晚則易愈矣如或差遲病即傳變雖欲除治必難為力服藥不如方法縱意違師不須治之此巴人下里之音通國所為和之者乎凡傷寒之病多從風寒得之始表中風寒入里則不消矣未有溫覆而當不消散者不在證治擬欲攻之猶當先解表乃可下之若表已解而內不消非大滿猶生寒熱則病不除若表已解而內不消大滿大實堅有燥屎自可除下之雖四五日不能為禍也若不宜下而便攻之內虛熱入協熱遂利煩躁諸變不可勝數輕者困篤重者必死矣叔和筆力軟弱纏擾如此一段入理深談正未可及後人不善讀者每遇陽明二三日下證藉為口實延至六七日方下而枯稿無救者多矣此則於叔和何尤夫陽盛陰虛汗之則死下之則愈引難經詞不達意最足惑人其意謂陽邪不解下入陰中以陽乘陰則為陽盛陰虛故可下而不可汗然前云此三陰邪入於裡可下而已於理甚精此但云陽盛陰虛則陽邪或在本位而未入於府尚不可知安見其可下乎若然所云大滿猶生寒熱不可攻下之説自相矛盾矣陽虛陰盛汗之則愈下之則死陽虛陰盛多有直中陰經之候汗之則愈談何容易其意謂陰乘陽位則為陽虛陰盛故可汗而不可下然外邪初入陽分終非陰盛可擬難經有問有答即表病里曷不繹明引之夫如是則神丹安可以誤發甘遂何可以妄攻虛盛之治相背千里吉凶之機應若影響豈容易哉況桂枝下咽陽盛則斃風邪入衛則為陽邪熾盛於表仲景用桂枝湯以解散肌表之邪正天然不易之良法也何反構此危詞豈誤以寒邪入營為陽盛耶夫寒邪入營但為陰邪熾盛於表所以仲景於脈浮緊無汗者有桂枝之禁謂當用麻黃湯也即誤用桂枝亦未必遂成死證況於下咽即斃視等砒霜妄為鄭重叔和全不達仲景之旨毋怪後人之吠聲矣承氣入胃陰盛以亡即難經陽虛陰盛下之則死之説衍入承氣務以惑人直中陰經之證大勢陰盛陽虛傳經傷寒之證大勢陽盛陰虛瘧證大勢陰陽更盛更虛內傷證大勢陰陽偏盛偏虛不可同語亦不必語死生之要在乎須臾視身之盡不暇計日此陰陽虛實之交錯其候至微發汗吐下之相反其禍至速而醫術淺狹懵然不知病源為治乃誤使病者殞沒自謂其分至今冤魂塞於冥路死尸盈於曠野仁者鑑此豈不痛歟凡兩感病俱作治有先後發表攻裡本自不同而執迷妄意者乃云神丹甘遂合而飲之且解其表又除其里言巧似是其理實違夫智者之舉措也嘗審以慎愚者之動作也必果而速安危之變豈可詭哉世上之士但務彼翕習之榮而莫見此傾危之敗惟明者居然能護其本近取諸身夫何遠之有焉兩感病治有先後發表攻裡本自不同持説甚正惜其不致詳耳凡發汗溫服湯藥其方雖言日三服若病劇不解當促其間可半日中進三服若與病相阻即便有所覺病重者一日一夜當晬時觀之若服一劑病證猶在故當復作本湯服之至有不肯汗出服三劑乃解若汗不出者死病也凡得時氣病至五六日而渴欲飲水飲不能多不當與也何者以腹中熱尚少不能消之便更與人作病也至七八日大渴欲飲水者猶當依證而與之與之常令不足勿極意也言能飲一斗與五升若飲而腹滿小便不利若喘若噦不可與之也忽然大汗出是為自愈也凡得病反能飲水此為欲愈之病其不曉病者但聞病飲水自愈小渴者乃強與飲之因成其禍不可復數也時氣病飲水能消不能消當與勿強與有次第凡得病厥脈動數服湯藥更遲脈浮大減小初躁後靜此皆愈證也凡治溫病可刺五十九穴又身之穴三百六十有五三十六穴灸之有害七十九穴刺之為災並中髓也引用內經五十九刺之法治溫中窾凡脈四損三日死平人四息病人脈一至名曰四損脈五損一日死平人五息病人脈一至名曰五損脈六損一時死平人六息病人脈一至名曰六損脈盛身寒得之傷寒脈虛身熱得之傷暑脈陰陽俱盛大汗出不解者死脈陰陽俱虛熱不止者死脈至乍疏乍數者死脈至如轉索者其日死譫言妄語身微熱脈浮大手足溫者生逆冷脈沉細者不過一日死矣此以前是傷寒熱病證候也引損脈入傷寒大謬按仲景遵內經熱病之旨作傷寒論明以內經為例叔和可無序也即欲附贅引內經原文發明切要以便後學足矣其插入異氣蔓衍繁文誠何心哉豈以仲景所無煉石足補天缺耶則自勒一家言另緯其後聽人之從違可耳乃造不經之説混亂經常至經常大義不挈一語以此網羅英賢悉入彀中其授受之途蓋已千年長夜矣有志躋仲景之堂者能無大剖叔和之藩也哉論春溫大意並辨叔和四變之妄喻昌曰春溫之證內經云冬傷於寒春必病溫又云冬不藏精春必病溫此論溫起之大原也傷寒論云太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期此論溫成之大勢也仲景以冬不藏精之溫名曰風溫其脈陰陽俱浮正謂少陰腎與太陽膀胱一藏一府同時病發所以其脈俱浮也發汗後身反灼熱自汗出身重多眠睡鼻息必鼾語言難出一一盡顯少陰本證則不可復從太陽為治況脈浮自汗更加汗之醫殺之也所以風溫證斷不可汗即誤下誤火亦經氣傷而陰精盡皆為醫促其亡而一逆再逆促命期矣於此見東海西海心同理同先聖後聖其揆一也後人不察惜其有論無方詎知森森治法全具於太陽少陰諸經乎晉王叔和不究仲景精微之蘊栽風種電為不根之談妄立溫瘧風溫溫毒溫疫四變不思時發時止為瘧瘧非外感之正病也春木主風而氣溫風溫即是溫證之本名也久病不解其熱邪熾盛是為溫毒溫毒亦病中之病也至溫疫則另加一氣乃溫氣而兼瘟氣又非溫證之常矣今且先辨溫瘧溫瘧正冬不藏精之候但其感邪本輕故止成瘧耳黃帝問溫瘧舍於何藏岐伯對曰溫瘧得之冬中於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外也如是者陰虛而陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧此可見溫瘧為冬不藏精故寒邪得以入腎又可見溫瘧遇溫尚不易發必大暑大汗始發之也叔和反以重感於寒立説豈其不讀內經乎抑何不思之甚耶今且再辨風溫春月時令本溫且值風木用事風溫二字自不得分之為兩凡病溫者悉為風溫即如初春地氣未升無濕溫之可言也天氣微寒無溫熱之可言也時令和煦無溫疫之可言也其所以主病之故全繫於風試觀仲景於冬月正病以寒統之則春月正病定當以風統之矣夫風無定體在八方則從八方在四時則從四時春之風溫夏之風熱秋之風涼冬之風寒自然之道也叔和因仲景論溫條中重挈風溫故謂另是一病不知仲景於溫證中特出手眼致其叮嚀見冬不藏精之人兩腎間先已習習風生得外風相召而病發必全具少陰之證故於溫字上加一風字以別太陽之溫耳叔和妄擬重感重變乃至後人作賦云風溫濕溫兮發正汗則危惡難醫又云因知風溫汗不休當用漢防己隔靴搔癢於本來之面目安在哉今且再辨溫毒夫溫證中之有溫毒一如傷寒證中之有陽毒陰毒也傷寒不以寒毒另為一證則溫病何得以溫毒更立一名耶況溫毒復有陰陽之辨太陽溫證病久不解結成陽毒少陰溫證病久不解結成陰毒叔和不知風溫為陰邪故但指溫毒為陽毒以致後人襲用黑膏紫雪陰毒當之慘於鋒刃其階厲亦至今未已耳其溫疫一證另辨致詳詳論溫疫以破大惑喻昌曰聖王御世春無愆陽夏無伏陰秋無悽風冬無苦雨乃至民無夭札物無疵癘太和之氣彌滿乾坤安有所謂溫疫哉然而周禮儺以逐疫方相氏掌之則溫疫之由來古有之矣鄉人儺孔子朝服而致其誠敬蓋以裝演巨像為儺神不過倣佛其形聖人以正氣充塞其間俾疫氣潛消乃位育之實功耳古人元旦汲清泉以飲芳香之藥上巳採蘭草以襲芳香之氣重滌穢也後漢張仲景著傷寒論欲明冬寒春溫夏秋暑熱之正自不能併入疫病以混常法然至理已畢具於脈法中叔和不為細繹乃謂重感於寒變為溫疫又謂春時應暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一歲之中長幼之病多相似者此則時行之氣也又謂冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同也又謂從春分節以後至秋分節前天有暴寒者皆為時行寒疫也蓋以春夏秋為寒疫冬月為溫疫所以又云三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微後人奉此而廣其義謂春感清邪在肝夏感寒邪在心秋感熱邪在肺冬感溫邪在腎塤篪遞奏舉世若狂矣嗟嗟疫邪之來果寒折陽氣乘其所勝而直入精神魂魄之藏人無噍類久矣更有謂疫邪無形象聲臭定時定方可言是以一歲之中長幼莫不病此至病傷寒者百無一二治法非疏里則表不透非戰汗則病不解愈摹愈遠究竟所指之疫仍為傷寒傷溫傷暑熱之正病疏里則下早可知戰汗則失表可知只足自呈敗闕耳夫四時不正之氣感之者因而致病初不名疫也因病致死病氣尸氣混合不正之氣斯為疫矣以故雞瘟死雞豬瘟死豬牛馬瘟死牛馬推之於人何獨不然所以飢饉兵凶之際疫病盛行大率春夏之交為甚蓋溫暑熱濕之氣交結互蒸人在其中無隙可避病者當之魄汗淋漓一人病氣足充一室況於連床並榻沿門闔境共驤之氣益以出尸尸蟲載道腐瑾燔柴掩席委壑投崖種種惡穢上溷蒼天清淨之氣下敗水土物産之氣人受之者親上親下病從其類有必然之勢如世俗所稱大頭瘟者頭面腮頤腫如瓜瓠者是也所稱蛤蟆瘟者喉痹失音頸筋脹大者是也所稱瓜瓤瘟者胸高脅起嘔汁如血者是也所稱疙瘩瘟者遍身紅腫發塊如瘤者是也所稱絞腸瘟者腹鳴乾嘔水泄不通者是也所稱軟腳瘟者便清泄白足重難移者是也小兒痘瘡尤多以上疫證不明治法咸委之劫運良可傷悼大率瘟疫痘疹古昔無傳不得聖言折衷是以墮落叔和坑塹曾不若俗見摸索病狀反可顧名思義也昌幸微窺仲景一班其平脈篇中雲寸口脈陰陽俱緊者法當清邪中於上焦濁邪中於下焦清邪中上名曰潔也濁邪中下名曰渾也陰中於邪必內栗也凡二百六十九字闡發奧理全非傷寒中所有事乃論疫邪從入之門變病之總所謂赤文緑字開天闢地之寶符人自不識耳篇中大意謂人之鼻氣通於天故陽中霧露之邪者為清邪從鼻息而上入於陽入則發熱頭痛項強頸攣正與俗稱大頭瘟蛤蟆瘟之説符也人之口氣通於地故陰中水土之邪者為飲食濁味從口舌而下入於陰入則其人必先內栗足膝逆冷便溺妄出清便下重臍築湫痛正與俗稱絞腸瘟軟腳瘟之説符也然從鼻從口所入之邪必先注中焦以次分布上下故中焦受邪因而不治中焦不治則胃中為濁營衛不通血凝不流其釀變即現中焦俗稱瓜瓤溫疙瘩瘟等證則又陽毒癰膿陰毒遍身青紫之類也此三焦定位之邪也若三焦邪溷為一內外不通藏氣熏蒸上焦怫鬱則口爛食齗衛氣前通者因熱作使遊行經絡藏府則為癰膿營氣前通者因召客邪嚏出聲嗢咽塞熱擁不行則下血如豚肝然以營衛漸通故非危候若上焦之陽下焦之陰兩不相接則脾氣於中難以獨運斯五液注下下焦不闔而命難全矣傷寒之邪先行身之背次行身之前次行身之側由外廓而入溫疫之邪則直行中道流布三焦上焦為清陽故清邪從之上入下焦為濁陰故濁邪從之下入中焦為陰陽交界凡清濁之邪必從此區分甚者三焦相溷上行極而下下行極而上故聲嗢咽塞口爛食齦者亦復下血如豚肝非定中上不及下中下不及上也傷寒邪中外廓故一表即散疫邪行在中道故表之不散傷寒邪入胃府則腹滿便堅故可攻下疫邪在三焦散漫不收下之復合此與治傷寒表裡諸法有何干涉奈何千年憒憒試折衷以聖言從前謬迷寧不渙然冰釋哉治法未病前預飲芳香正氣藥則邪不能入此為上也邪既入急以逐穢為第一義上焦如霧升而逐之兼以解毒中焦如漚疏而逐之兼以解毒下焦如瀆決而逐之兼以解毒營衛既通乘勢追拔勿使潛滋詳訂諸方載春溫方後有問春夏秋蒸氣成疫豈冬溫獨非疫耶余曰冬月過溫腎氣不藏感而成病正與不藏精之春溫無異計此時有春無冬三氣即得交蒸成疫然遇朔風驟發則蒸氣化烏有矣是以東南冬月患正傷寒者少患冬溫及痘瘡者最多西北則秋冬春皆患正傷寒殊無溫疫痘瘡之患矣此何以故西北土高地燥即春夏氣難上升何況冬月之凝沍東南土地卑濕為霧露之區蛇龍之窟其溫熱之氣得風以播之尚有可耐設旦暮無風水中之魚衣中之蝨且為飛揚況於人乎蒸氣中原雜諸穢益以病氣死氣無分老少觸之即同一病狀矣此時朔風了不可得故其氣轉積轉暴雖有薰風但能送熱不能解涼盛世所謂解慍阜財者在兵荒反有注邪布穢之事矣叔和以夏應大熱而反大寒為疫詎知大寒正疫氣消弭之候乎故疫邪熾盛惟北方始能消受詩惡譖人思欲投畀有北以熄其焰析義精矣鄉紳萬吉人營葬五雷驚蛇之地觸動土瘟壯者病疫少者病痘一夕暴死五人余令於營北掘井二丈投豬首饅首蒸飯促引土氣下收旋封其井即得安全無損此余偶試楊曾之祕非心得也范文正公守饒冬溫吏請禱雪公取薄冰置座默坐良久瑞雪滿空頃深三尺蟊賊疫鬼何地潛蹤耶可見先儒退藏於密借凝冰為影草已攝大地於清冷之淵矣詎非法王手眼乎
