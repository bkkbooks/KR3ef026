front:
  text: 尚論篇自序混茫初開聖神首出民用未興藥草先備醫道之關性命為何如哉軒轅帝尊其臣岐伯為天師每聞典要心載拜敬受金匱玉函珍藏其文由茲神工繼起倉扁而下代有傳人或發揮方書或抽揚脈理非不燦然天地間然能神悟於靈蘭之先獨探夫鴻濛之秘從無文之文解畫前之卦使讀者因象得義因義得神冥入無垠顯傳衣帶則曠世以來未易覯也輓世道降術升醫事之不振久矣昌一人即身為標言為的而獨吹無和少見多怪此理一晦黑若夜行心竊憂之於是杜門樂飢取古人書而尚論之然而泛涉則管窺蠡測終身莫殫攬要則玄珠妙諦罔象可求不知古人與我俱範圍於道者也同於穆然無朕中而剖抉性命之微古人所言皆我固有觀天之道觀我之生機非相貸古人既往有我負荷韞藏待剖棼絲待理責難他諉昔阿難問世尊曰古佛以何人為師世尊答曰以吾為師此即誕生所指天上天下惟吾獨尊之旨可見吾之分量天地古今莫得而囿但非昌之所敢舉揚者也昌意中只求精神呼吸實與古人潛通一脈若啟迪於愚衷稟承於覿面凡有闡述一如陽燧方諸之得水火天然感召泯絕思議於以快吾尚論之本懷耳雖然高明之弊說經創解其事多僭固陋之弊牽文襲義其事多竊惟僭與竊一念好名終古貽害覆轍相尋可無懼乎昌不揣嘗慨仲景傷寒論一書天苞地符為眾法之宗群方之祖雜以後人知見反為塵飯土羹莫適於用茲特以自然之理引伸觸類闡發神明重開生面讀之快然覺無餘憾至春溫一症另闢手眼引內經為例曲暢厥旨究不敢於仲景論外旁溢一辭後有作者庶不為冥索旁趨得以隨施輒效端有望焉顧窮源千仞進求靈素難經甲乙諸書文義浩渺難以精研用是參究仲景金匱之遺分門析類定為雜證法律十卷覃思九載擬議以通玄奧俾觀者爽然心目合之傷寒論可為濟川之舟楫烹魚之釜鬵少塞吾生一日之責即使貽譏於識者所不辭也夫人患無性靈不患無理道世患無理道不患無知我古君子執理不阿秉道不枉名山國門庶幾一遇氣求聲應今昔一揆是編聊引其端等諸爝火俟夫圓通上智出其光華於以昭徹玄微與黃岐仲景而合轍昌也糠粃在前有榮施矣順治戊子歲孟夏月西昌喻昌嘉言甫識
