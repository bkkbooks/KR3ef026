body:
  text: 卷一尚論仲景傷寒論重編三百九十七法論太陽經傷寒證治大意王叔和當日編次仲景傷寒論以辨痙濕暍脈證為第一以辨太陽病脈證為第二謂痙濕暍雖太陽經之見證然宜應別論故列之篇首此等處最不妥當豈有別論反在正論之前者況既應別論即當明言所指而故虛懸其篇此叔和不究心之弊也至於太陽經中一概混編合病並病溫病壞病過經不解病以及少陽諸病如理棼絲不清其脈寸寸補接所以不適於用徒令觀者嘆息此更叔和不究心之弊也宋林億成無己輩以脈法及傷寒例居前次痙濕暍次太陽病分上中下三篇其意以桂枝證麻黃證匯上篇大青龍證及汗後下後諸證匯中篇結胸及痞證匯下篇究竟上篇混中下下篇混上中不能清也更可笑者下篇結胸例中凡繫結字一概收入如陽微結陰微結脈代結之類悉與結胸同匯尤可笑者上篇第六條傷寒大義未及什一何所見即匯溫病中篇下篇太陽本證未及什七何所見即匯少陽證及合病並病過經不解諸病如此割裂原文後人縱思研究無門可入矣夫足太陽膀胱病主表也而表有營衛之不同病有風寒之各異風則傷衛寒則傷營風寒兼受則營衛兩傷三者之病各分疆界仲景立桂枝湯麻黃湯大青龍湯鼎足大綱三法分治三證風傷衛則用桂枝湯寒傷營則用麻黃湯風寒兩傷營衛則用大青龍湯用之得當風寒立時解散不勞餘力矣乃有病在衛而治營病在營而治衛病在營衛而治其一遺其一與夫病已去營衛而復汗病未去營衛而誤下以致經傳錯亂展轉不已源頭一差末流百出於是更出種種節目輔三法而行正如八卦之有六十四卦八陳之有六十四陳分統於乾坤震巽坎離艮兌天地風云龍虎鳥蛇之下始得井井不紊仲景三五錯綜以盡病之變態其統於桂枝麻黃青龍三法夫復何疑第文辭奧約義例互陳雖穎敏之士讀之不解其意實由當時編次潦草糊塗不察來意仲景一手一目現為千手千目編者反將千手千目掩為一手一目悠悠忽忽沿習至今昌不得已而僭為尚論太陽經中仍分三篇以風傷衛為上篇寒傷營為中篇風寒兩傷營衛為下篇一一以膚淺之語括大義於前明奧旨於後其溫病合病等名逐段清出另立篇目俾讀者了無疑惑於心庶隨所施而恰當矣太陽經上篇凡風傷衛之證列於此篇法五十三條太陽經受病之初有定脈定證一法太陽之為病脈浮頭項強痛而惡寒原文先挈太陽病之總脈總證統中風傷寒為言也太陽膀胱經乃六經之首主皮膚而統營衛所以為受病之始太陽受病有風寒不同宜辨陰陽而定愈日通計五法病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六也原文風為陽衛亦陽故病起於陽寒為陰營亦陰故病起於陰無熱惡寒指寒邪初受未郁為熱而言也少頃鬱勃於營間則仍發熱矣太陽中篇第一條云或已發熱或未發熱正互明其義也病發於陽其愈宜速乃六日傳經已盡必至七日方愈者陽數七主進故也病發於陰其愈宜遲乃至六日經盡即愈者陰數六主退故也得病之始各從陰陽之類而起得病之終各從陰陽之類而愈此道之所以本乎自然而人身與天地同撰也太陽病頭痛至七日已上自愈者以行其經盡故也若欲再作經者針足陽明使經不傳則愈原文七日而云已上者該六日而言也六日傳至厥陰六經盡矣至七日當再傳太陽病若自愈則邪已去盡不再傳矣設不愈則七日再傳太陽八日再傳陽明故針足陽明以竭其邪乃得不傳也在他經則不然蓋陽明中土萬物所歸無所復傳之地邪易解散故耳然必針以竭其邪始得歸併陽明不犯他界也舊謂奪其傳路而遏之則經經皆可遏矣何獨取陽明也哉太陽病欲解時從巳至未上原文凡病欲解之時必從其經氣之王太陽者盛陽也故從巳午未之王時而病解欲自解者必當先煩乃有汗而解何以知之脈浮故知汗出解也原文天地鬱蒸而雨作人身煩悶而汗作氣機之動也氣機一動其脈必與其症相應故脈浮而邪還於表才得有汗而外邪盡從外解設脈不以浮應則不能作汗其煩即為內入之候又在言外矣已上四條先挈太陽經始病終愈風寒之總法太陽受病風寒不同先辨中風定脈定證一法太陽病發熱汗出惡風脈緩者名為中風原文既有第一條脈浮頭項強痛惡寒之總證更加發熱汗出惡風脈緩則其病乃是觸冒於風所致即名中風中字與傷字無別即謂傷風亦可風性屬陽從衛而入以衛為陽氣所行之道從其類也此一條又中風病之總稱已後凡言中風病三字而發熱汗出惡風脈緩即括在內中風病主用桂枝湯解肌大綱一法太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之原文陽浮陰弱與下文衛強營弱同義陽浮者陽邪入衛脈必外浮陽性本熱風性善行所以發熱快捷不待閉郁自發也陰弱者營無邪助比衛不足脈必內弱陰弱不能內守陽強不為外固所以致汗直易不等覆蓋自出也嗇嗇惡寒內氣餒也淅淅惡風外體疏也雖寒與風並舉義重惡風惡風未有不惡寒者所以中篇傷寒證中亦互云惡風又見惡寒未有不惡風者後人相傳謂傷風惡風傷寒惡寒苟簡辨證誤人多矣翕翕發熱乃氣蒸濕潤之熱比傷寒之乾熱不同息鳴者陽邪上壅也乾嘔者陽邪上逆也故取用桂枝湯解散肌表之陽邪而與發汗驅出陰寒之法迥乎角立也服已須臾啜熱稀粥一升余以助藥力溫覆令一時許遍身漐漐微似有汗者益佳不可令如水流漓病必不除若一服汗出病差停後服不必盡劑若不汗重服依前法又不汗後服小促其間半日許令三服盡若病重者一晝一夜服周時觀之服一劑盡病證猶在者更作服若汗不出者乃服至二三劑禁生冷黏滑肉面五辛酒酪臭惡等物桂枝氣味俱薄服過片頃其力即盡所以能解肌者妙用全在啜稀熱粥以助藥力穀氣內充則邪不能入而熱啜以繼藥之後則邪不能留法中之法若此世傳方書無此四字駸失初意更有肌膚已透微似之汗蓋覆強逼至令大汗流漓者總由不識解肌為何義耳按衛行脈外風傷衛之證皆傷其外外者肌膚也故但取解肌以散外不取發汗以內動血脈更不取攻下以內動藏府所以服桂枝時要使周身漐漐然似乎有汗者無非欲其皮間毛竅暫開而邪散也然恐藥力易過又藉熱稀粥以助其緩如此一時之久肌竅不致速閉則外受之邪盡從外解允為合法矣不識此意者汗時非失之太過即失之不及太過則邪未入而先擾其營甚則汗不止而亡陽不及則邪欲出而早閉其門必致病不除而生變仲景言之諄諄後人轉加忽略茲特詳發其義桂枝湯有禁用三法桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也原文已見寒傷營之脈證即不可誤用風傷衛之治法用之則寒邪漫無出路留連肉腠貽患無窮故為首禁凡服桂枝湯吐者其後必吐膿血也原文桂枝辛甘本胃所愛服之反吐其人濕熱素盛可知矣濕熱素盛更服桂枝則兩熱相合滿而不行勢必上逆而吐吐逆則其熱愈淫溢於上焦蒸為敗濁故必吐膿血此一大禁也其誤服未至於吐者上焦清氣未傷熱雖漸消亦陷險矣酒客病不可與桂枝得湯則嘔以酒客不喜甘故也原文酒為濕熱之最故即於上條文意重引酒客以示戒嘔吐乃互詞勿泥按辛甘發散為陽內經之旨也仲景遵之制方重申辛甘之戒可謂慮周千變矣如酒客平素濕與熱搏結胸中才挾外邪必增滿逆所以辛甘之法遇此輩即不可用辛甘不可用則用辛涼以撤其熱辛苦以消其滿自不待言矣後人不察偏詆桂枝為難用即不遇酒客無端變亂內經定法可勝誅哉葛根雖酒客所宜然犯太陽經禁又不可用汗後水氣上逆有禁更汗增滿一法發汗後水藥不得入口為逆若更發汗必吐下不止原文此一條從來諸家錯會扯入桂枝四禁謂已用桂枝致逆若更用桂枝則其變愈大粗疏極矣蓋為逆是言水逆未嘗説到其變愈大為凶逆也且原文不云更與桂枝而云更發汗者見水藥俱不得入則中滿已極更發汗以動其滿凡是表藥皆可令吐下不止不獨是桂枝當禁所以仲景於太陽水逆之證全不用表藥惟用五苓散以導水服後隨溉熱湯以取汗正與此條互相發明也設只單禁桂枝將麻黃葛根柴胡等類在所不禁而誤用以致吐下不止恬不知為犯禁矣噫斯道之不明小者且然況其大乎中風病主用桂枝湯解肌和營衛七法太陽病頭痛發熱汗出惡風者桂枝湯主之原文頭痛見第一條發熱汗出惡風見第六條重互其文以叮嚀辨證用法首宜識此也太陽病外證未解脈浮弱者當以汗解宜桂枝湯原文浮弱即陽浮陰弱之謂外證未解脈見浮弱即日久必當以汗解然汗解要當遵桂枝湯之法見不可誤行發汗之法也至於不可誤下更不待言矣太陽病發熱汗出者此為營弱衛強故使汗出欲救邪風者宜桂枝湯主之原文衛得邪助而強營無邪助故為弱也即前陽浮陰弱之義而重挈明之耳須知營弱與血虛無涉邪風即風邪勿鑿看病人藏無他病時發熱自汗出而不愈者此為衛氣不和也先其時發汗則愈宜桂枝湯主之原文藏無他病四字檃括人身宿病即動氣不可發汗亦在內見里無病而但表中風邪乃有汗出不愈者必是衛氣不和也設入於營則里已近災未可宴然稱無病矣時發熱者有時發熱有時不熱也故先於未發熱時主用解肌之法邪自不留也病嘗自汗出者此為營氣和營氣和者外不諧以衛氣不共營氣和諧故爾以營行脈中衛行脈外復發其汗營衛和則愈宜桂枝湯原文此明中風病所以衛受邪風營反出汗之理見營氣本和但衛強不與營和復發其汗俾風邪從肌竅外出斯衛不強而與營和正如中酒發狂酒去其人帖然矣營受寒邪不與衛和宜麻黃湯亦然太陽病初服桂枝湯反煩不解者先刺風池風府卻與桂枝湯則愈原文中風之證凡未傳變者當從解肌舍解肌無別法也然服桂枝湯以解肌而反加熱悶者乃服藥時不如法也其法維何即啜稀熱粥以助藥力不使其不及但取周身漐漐微似有汗不使其太過之謂也此云服湯反煩者必微似汗亦未得肌竅未開徒用藥力引動風邪漫無出路勢必內入而生煩也刺風池風府以瀉風熱之暴甚後風不繼庶前風可熄更與桂枝湯引之外出則愈矣可見解肌當如法也因服桂枝生煩豎此妙義不可不講故特詳其意俾用藥者知所當務焉風家表解而不了了者十二日愈原文風家表解已用桂枝湯之互詞也用桂枝湯表解已勝其任矣而不了了者風為陽邪衛為陽氣風邪雖去而陽氣之擾攘未得遽寧即欲治之無可治也七日不愈俟十二日則餘邪盡出正氣復理必自愈矣見當靜養以需不可喜功生事也已上七條曲盡用桂枝湯妙義一條辨用桂枝之證二條辨用桂枝之脈三條辨衛強營弱宜用桂枝兩和營衛四條辨衛氣不和宜在未發熱前用桂枝和衛五條辨營氣不和宜仍用桂枝和衛六條辨陽邪熾盛服桂枝轉煩者先刺風穴再行桂枝七條辨用桂枝表已解宜俟勿藥似此深切著明可惜從前混編茲特挈出不解肌或誤汗病邪入里用五苓兩解表裡二法中風發熱六七日不解而煩有表裡證渴欲飲水水入則吐者名曰水逆五苓散主之多服暖水汗出愈原文傷風證原有汗以其有汗也延至日久不行解肌之法汗出雖多徒傷津液表終不解轉增煩渴邪入於府飲水則吐者名曰水逆乃熱邪挾積飲上逆以故外水格而不入也服五苓散後頻溉熱湯得汗則表裡俱解蓋表者陽也里之屬府者亦陽也所以一舉兩得也然亦以未經誤治邪不內陷故易為力耳膀胱為津液之府用五苓散通調水道則火熱自化而津液得全矣太陽病發汗後大汗出胃中干煩躁不得眠欲得飲水者少少與飲之令胃氣和則愈若脈浮小便不利微熱消渴者與五苓散主之原文不行解肌反行發汗致津液內耗煩躁不眠求救於水若水入不解脈轉單浮則無他變而邪還於表矣脈浮本當用桂枝何以變用五苓耶蓋熱邪得水雖不全解勢必衰其大半所以邪既還表其熱亦微兼以小便不利證成消渴則府熱全具故不從單解而從兩解也凡飲水多而小便少者謂之消渴裡熱熾盛何可復用桂枝之熱故導濕滋干清熱惟五苓有全功耳不解肌而誤發大汗其變逆有救亡陽漏風二法太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之原文此本為誤服大青龍湯因而致變者立法然陽虛之人才發其汗便出不止即用麻黃火劫等法多有見此證者所以仲景於桂枝湯中垂戒不可令如水流漓益見解肌中且有逼汗亡陽之事矣太陽下篇大青龍證中垂戒云若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤正與此段互發振振欲劈地五字形容亡陽之狀如繪諸家竟不加細繹妄取詩經注劈拊心貌為解噫是何言歟仲景論中心下悸欲得人按與夫叉手自冒心間且與拊心之義不協何得妄指劈地為拊心耶蓋劈者闢也避也汗出過多衛氣解散其人似乎全無外廓故振振然四顧倣徨無可置身思欲闢地而避處其內也陰證似陽者欲坐井中避熱就冷也汗多亡陽者欲入土中避虛就實也試觀嬰孩出汗過多神虛畏怯嘗合面偎入母懷者豈非振振欲劈地之一驗乎從來皆以為驚風誤治實由未透傷寒證中之大關耳太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之原文大發其汗致陽氣不能衛外為固而汗漏不止即如水流漓之互詞也惡風者腠理大開為風所襲也小便難者津液外泄而不下滲兼以衛氣外脫而膀胱之化不行也四肢微急難以屈伸者筋脈無津液以養兼以風入而增其徑也此陽氣與陰津兩亡更加外風復入與前條亡陽一證微細有別故用桂枝加附子以固表驅風而復陽斂液也不解肌而以火劫汗傷陰致變四法一法辨陰未盡亡一法辨邪所由解一法不得汗反躁必圊血一法辨脈微而數者不可炙太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿而喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾捻衣摸床小便利者其人可治原文風陽也火亦陽也邪風更被火熱助之則血氣沸騰所以失其常度熱勢瀰漫所以蒸身為黃然陽邪盛於陽位者尚或可從衄解可從汗解至於陽邪深入陰分勢必劫盡精津所以劑頸以下不能得汗口乾咽爛肺焦喘促身體枯燥小便難大便祕手足擾動譫妄噦逆乃是一團邪火內熾真陰傾刻立盡之象有非藥力所能勝者必其人小便尚利陰未盡傷始得以行驅陽救陰之治也噫亦危矣仲景以小便利一端辨真陰之亡與未亡最細蓋水出高源小便利則津液不枯肺氣不逆可知也腎以膀胱為府小便利則膀胱之氣化行腎水不枯可知也按此證陽邪挾火擾亂陰分而亡其陰與前二條亡陽證天淵懸絶觀陽盛欲衄身體枯燥等語明是失汗所致失汗則陽必內入何反外亡耶注家泥陰陽俱虛竭一語遂謂小便利者陰未甚虛則陽猶可回是認可治為回其陽大失經旨不知此證急驅其陽以存陰氣之一線尚恐不得況可回陽以更劫其陰乎且頭汗乃陽邪上壅不下通於陰所以劑頸以下不能得汗設見衄血則邪從衄解頭間且無汗矣設有汗則邪從汗解又不衄矣後條火邪深入必圊血一證亦謂身體枯燥而不得汗者必致圊血設有汗更不圊血矣讀古人書全要會意豈有得汗而加衄血圊血之理哉又豈有遍身無汗而頭汗為亡陽之理哉太陽病二日反躁反尉其背而大汗出火熱入胃胃中水竭躁煩必發譫語十餘日振栗自下利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及多大便已頭卓然而痛其人足心必熱穀氣下流故也原文此段文義隱奧從來注釋不得其解謹明之以暢尚論之懷蓋火邪入胃中十餘日不解忽振栗自下利者火邪從大腸下奔其候本為欲解然而不解者以從腰以下不得汗邪雖下走終不外走故不解也上條從頸已下不得汗其勢重此從腰以下不得汗其勢較輕足下惡風見陽邪但在下也小便不得見陽邪閉拒陰竅也與不得汗正同所以大便亦硬益見前之下利為火熱急奔火勢衰減則仍硬也反嘔者邪欲從上越也欲失溲者邪欲從前陰出也皆餘邪欲散之徵也胃火既減小便當數復不數則津液可回及至津之下潤則久積之大便必盡出矣大便出多則小便之當數者始數矣腸胃之間邪熱既散而不持則腰已下之得汗並可知矣得汗則陰分之陽邪盡從外解然後身半以下之陰氣得上而反頭痛身半以上之陽氣得下而反足心熱欲愈之狀尚類病狀火邪助虛為何如哉太陽病以火熏之不得汗其人必躁到經不解必清血名為火邪原文火邪入胃胃中水液多者必奔迫下利其漸解悉如上條矣若胃中津液素乏之人復受火邪則漫無可御必加躁擾不寧由是深入血室而圊血也蓋陽邪不從汗解得以襲入陰中動其陰血倘陽邪不盡其圊血必無止期故申之曰名為火邪示人以治火邪而不治其血也微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也原文脈微而數陰虛多熱之徵也此而灸之則虛者益虛熱者益熱不至傷殘不止矣凡病者皆然不獨傷寒宜戒也針灸家亦識此義否不解肌而用燒針取汗寒入核起灸核止變一法燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂原文奔豚者腎邪也腎邪一動勢必自少腹上逆而衝心狀若豕突以北方亥位屬豬故也北方腎邪惟桂能伐之所以用桂三倍加入桂枝湯中外解風邪內泄陰氣也嘗即此例推之凡發表誤入寒藥服後反加壯熱肌膚起赤塊畏寒腹痛氣逆而喘者或汗時蓋覆未周被風寒復侵紅腫喘逆其證同者用此法良驗一婦病外感服表藥後忽面若妝朱散發叫喘雙手上揚余知其腹作奔豚也用此方傾之即定不解肌而用吐藥雖得汗內傷脾胃名為小逆二法太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致此為小逆原文解肌之法解散肌表風邪全不傷動脾胃乃天然不易之法也若舍此而妄用吐法吐中亦有發散之義故不惡寒發熱一二日病在太陽吐之則腹中肌口不能食三四日病在陽明吐之則不喜糜粥欲食冷食皆胃氣受傷之故也然且朝食暮吐脾中之真陽亦傷而不能消穀是則外感雖除脾胃內傷卒未易復故為小逆也太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也原文此以吐而傷胃中之陰較上條兩傷脾胃之陰陽者稍輕故內煩不欲近衣雖顯虛熱之證比關上脈細數已成虛熱之脈者亦自不同然以吐而傷其津液雖幸病不致逆醫者能無過乎可見用吐法時亦當相人之津液矣中風肌未解不可下宜用桂枝湯解外一法太陽病外證未解者不可下也下之為逆欲解外者宜桂枝湯主之原文下之為逆即指結胸等證而言欲解外者必無出桂枝一法叮嚀無已之辭也外邪未解下必為逆然則欲下未下之時亟解其肌俾下之而不為逆也不亦可乎中風肌未解誤汗下無他變者仍當用桂枝湯一法太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈宜桂枝湯主之原文見已下其脈仍浮證未增變者仍當亟解其外也不解肌反誤下邪不服者於前下藥內更加桂枝一法太陽病下之其氣上衝者可與桂枝湯方用前法若不上衝者不可與之原文誤下而陽邪下陷然無他變但仍上衝陽位則可從表裡兩解之法故以桂枝湯加於前所誤用下藥之內則表邪外出里邪內出即用桂枝大黃湯之互詞也若不上衝則表裡兩解之法漫無取義其不可與明矣不解肌反誤下心痞用桂枝加溫補藥兩解表裡一法太陽病外證未除而數下之遂協熱而利利下不止心下痞硬表裡不解者桂枝人參湯主之原文誤下則致裡虛裡虛則外熱乘之變而為利不止者裡虛不守也痞硬者正虛邪實中成滯礙否塞而堅滿也以表未除故用桂枝以解之以里適虛故用理中以和之此方即理中加桂枝而易其名亦治虛痞下利之聖法也不解肌反誤下邪入陽明變用太陽兩解一法太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之原文太陽病原無里證但當用桂枝解外若當用不用而反下之利遂不止則熱邪之在太陽者未傳陽明之經已入陽明之府所以其脈促急其汗外越其氣上奔則喘下奔則泄故舍桂枝而用葛根專主陽明之表加芩連以清裡熱則不治喘而喘自止不治利而利自止又太陽兩解表裡之變法也不解肌反誤下宜辨陽實陽虛加減桂枝湯一法太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之原文誤下脈促與上條同以無下利不止汗出等證但見胸滿則陽邪仍盛於陽位幾與結胸同變然滿而不痛且諸證未具胸未結也故取用桂枝之芳甘以亟散太陽之邪其去芍藥之意酸收二字不足盡之以誤下故不敢用恐其復領陽邪下入腹中也設微見惡寒則陽虛已著而非陽邪上盛之比去芍藥方中即當加附子以回其陽是雖不言汗出然由此條之微惡寒合上條觀之則脈促胸滿喘而汗出之內原伏有虛陽欲脫之機故仲景於此條特以微惡寒三字發其義可見陽虛則惡寒矣又可見汗不出之惡寒即非陽虛矣傷寒證中多有下後魄汗不止而釀亡陽之變者必於此等處參合以求神髓庶幾可進於道耳不解肌反誤下陽邪作喘有用桂枝加行氣藥一法太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之喘家作桂枝湯加厚朴杏子仁原文凡下後利不止而加上氣喘急者乃是上爭下奪之象危候也但驟病之人中氣足供上下之用邪盡而喘與利自止若中氣素餒加以上下交徵立盡之數矣此證不云下利但云微喘表未解則是表邪因誤下上逆與虛證不同故仍用桂枝以解表加厚朴杏仁以利下其氣亦微里之意也此訣風邪誤下作喘治法之大要其寒邪誤下作喘當用麻黃石膏即此可推故中篇不復贅也不解肌反誤下有憑脈定變一法太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必咽痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血原文脈促為陽邪上盛反不結聚於胸則陽邪未陷可勃勃從表出矣故為欲解也脈浮者必結胸即指促脈而申之見脈促而加之以浮邪氣彌滿於陽位故必結胸也浮字貫下四句見浮而促必結胸浮而緊必咽痛浮而弦必兩脅拘急浮而細數必頭痛未止皆太陽本病之脈故主病亦在太陽之本位設脈見沉緊則陽邪已入於陰分但入而未深仍欲上衝作嘔其無結胸咽痛等證從可知矣只因論中省用一個促字三個浮字後之讀者遂眩謂緊為下焦屬在少陰惑之甚矣觀本文下句即指出沉緊者必嘔吐一語正見前緊字指浮緊言也沉緊方是陽邪入陰上逆作嘔豈有浮緊咽痛反為少陰寒邪上衝之理明明太陽誤下之脈證何緣插入少陰爚亂後人耶至於滑脈居浮沉之間亦與緊脈同推故沉滑則陽邪入陰而主下利浮滑則陽邪正在營分擾動其血而主下血也夫太陽誤下之脈主病皆在陽在表即有沉緊沉滑之殊亦不得以里陰名之仲景辨析之精詎可雜以贅龐哉中風病不解熱結膀胱下血有宜先表后里一法太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯原文邪熱搏血結於膀胱膀胱者太陽寒水之經也水得熱邪必沸騰而上侮心火故其人如狂見心雖未狂有似乎狂也血自下者邪熱不留故愈若少腹急結則膀胱之血蓄而不行先解外乃可攻其攻法亦自不同必用桃仁增入承氣以達血所仍加桂枝分解外邪正恐餘邪少有未解其血得以留戀不下耳桃仁承氣湯中用桂枝解外與大柴胡湯中用柴胡解外相仿益見太陽隨經之熱非桂枝不解耳中風病不解熱瘀下焦蓄血明辨脈證用抵當湯二法太陽病六七日表證仍在脈微而沉反不結胸其人發狂者以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裡故也抵當湯主之原文此條之證較前條更重且六七日表證仍在曷為不先解其外耶又曷為攻藥中不兼加桂枝耶以脈微而沉反不結胸知邪不在上焦而在下焦也若少腹硬滿小便自利則其人之發狂者為血蓄下焦無疑矣故下其血自愈然蓄血而至於發狂則熱勢攻心桃仁承氣不足以動其血桂枝不足以散其邪非用單刀直入之將必不能斬關取勝故名其湯為抵當抵者至也乃至當不易之良法也奈何聖人以為至當愚人以為非常詎知邪結於胸則用陷胸以滌飲邪結少腹則用抵當以逐血設非此一法少腹中所結之血既不附氣而行更有何藥可破其堅壘哉所以一峻攻斯血去而邪不留並無藉桂枝分解之力耳噫非優入聖域之大賢烏足共論此哉太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂者血證諦也抵當湯主之原文此一條乃法中之法也見血證為重證抵當為重藥恐後人辨認不清不當用而誤用與夫當用而不敢用故重申其義言身黃脈沉結少腹滿三者本為下焦蓄血之證然只現此尚與發黃相鄰必如前條之其人如狂小便自利則血證無疑而舍抵當一法別無他藥可代之矣小便不利何以見其非血證耶蓋小便不利乃熱瘀膀胱無形之氣病為發黃之候也小便自利則膀胱之氣化行然後少腹滿者允為有形之蓄血矣庸工不能辨證實於此等處未著眼耳中風病以小便利否定里證一法太陽病小便利者以飲水多必心下悸小便少者必苦裡急也原文小便清利本為邪不在裡若因飲水過多致小便之利則水未入腹先與邪爭必主心下悸也小便少者即小便短赤里證已具之意但本文云必苦裡急明是謂飲水多而小便少者邪熱足以消水故直指為里證已急也以飲水多三字貫下其旨躍然中風病汗吐下後小便不利宜俟津回自愈一法大下之後復發汗小便不利者亡津液故也勿治之得小便利必自愈凡病若發汗若吐若下若亡血亡津液陰陽自和者必自愈原文泉之竭矣不云自中古今通弊醫事中之操霸術者其人已亡津液復強責其小便究令膀胱之氣化不行轉增滿硬脹喘者甚多故宜以不治治之俟其津液回小便利必自愈也於此見汗下恰當津液不傷為措於不傾藏於不竭之良圖矣中風病下後復汗因虛致冒先汗解後議下一法太陽病下之而不愈因復發汗以此表裡俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得里未和然後下之原文冒者神識不清似有物矇蔽其外也所以必須得汗俾外邪先從外徹然後辨其二便之和否再一分解其邪也然而表裡俱虛之證其兩解之法宜輕而且活所以説汗出自愈未嘗指定服藥也又説得里未和然後下之但示其意並不出方後人孰察其遵內經虛者責之之義乎若論用藥表無過桂枝里無過大柴五苓矣中風病表裡已虛餘邪未解辨脈用治迥異初病一法太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯主之原文病久而外邪不解不過是入陽入陰之二途既陰陽兩停初無偏勝可以解矣猶必先振栗始得汗出而解虛可知也其有不為振汗邪無出機者辨脈用法要與初病不同蓋初病皆邪氣勝則實之脈病後皆正氣奪則虛之脈所以最虛之處便是容邪之處故陽脈微者邪乘其陽汗之而解陰脈微者邪乘其陰下之而解必須透此一關始得用藥與邪相當邪去則正自復不補虛而自補耳至於虛者責之之意前條已露一班此云若欲下之宜調胃承氣湯意更輕活其無取於大汗大下具在言外矣中風病嘔利痞滿表解可攻與攻胃實迥異一法太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解里未和也十棗湯主之原文此證與結胸頗同但結胸者邪結於胸其位高此在心下及脅其位卑然必表解乃可攻之亦與攻結胸之戒不殊也其人漐漐汗出發作有時而非晝夜俱篤即此便是表解之徵雖有頭痛心下痞硬滿引協下痛乾嘔短氣諸證乃邪結之本證不得以表證名之若待本證盡除後乃攻之不坐誤時日乎故復申其義見汗出不惡寒便是表解可攻之候慮何深耶蓋外邪挾飲兩相搏結設外邪不解何緣而得汗出津津乎攻藥取十棗湯者正與結胸之陷胸湯相仿因傷寒門中種種下法多為胃實而設胃實者邪熱爍干津液腸胃俱結不得不用苦寒以蕩滌之今證在胸脅而不在胃則胃中津液未經熱耗而蕩滌腸胃之藥無所取矣故取蠲飲逐水於胸脅之間以為下法也中風病本痰標熱誤下有結胸及協熱利之變一法太陽病二三日不能臥但欲起心下必結脈微弱者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也原文二三日不能臥但欲起陽邪熾盛逼處心胸擾亂不寧所以知其心下必結然但顯欲結之象尚未至於結也若其人脈微弱者此平日素有痰飲積於心膈之分適與外邪相召外邪方熾其不可下明矣反下之若利止則邪勢乘虛欲結者愈益上結利未止因復下之俾陽邪不復上結亦將差就錯因勢利導之法但熱邪從表解極易從里解極難協熱下利熱不盡其利漫無止期亦危道也合上條外邪搏飲之證反復提海深切著明從來疑是闕文可為嘆息中風病誤下熱邪內陷而成結胸六法一法論結胸及痞之源一法論脈證所以結胸之故一法論結胸兼涉陽明一法論結胸似涉柔痓一法論脈浮大下之死一法論證加煩躁不下亦死病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也原文風為陽邪病發於中風陽邪未從外解而反下之其熱勢乘虛陷入必硬結於胸上寒為陰邪病發於傷寒陰邪未從外解而反下之其熱勢乘虛陷入必痞塞於心間二證皆由下早皆是熱入省文以見意也太早則邪方熾盛既未外解又未傳經此而下之其變安得不大耶太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余無汗劑頸而還小便不利身必發黃也原文中風病見浮動數之三脈主風主熱主痛更主虛虛故邪持日久頭痛發熱惡寒表終不解醫不知其邪持太陽未傳他經反誤下之於是動數之脈變遲而在表之證變結胸矣動數變遲三十六字形容結胸之狀殆盡蓋動數為欲傳之脈而變遲則力綿勢緩而不能傳且有結而難開之象膈中之氣與外入之邪兩相格鬥故為拒痛胃中水穀所生之精悍因誤下而致空虛則不能藉之以衝開外邪反為外邪衝動其膈於是正氣往返邪逼之界覺短氣不足以息更躁煩有加於是神明不安方寸之地覺剝膚近災無端而生懊憹凡此皆陽邪內陷所致陽本親上故據高位而心下硬痛為結胸也非化工之筆安然點綴病情若此哉太陽病重發汗而復下之不大便五六日舌上燥而渴日晡所小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之原文不大便燥渴日晡潮熱少腹硬滿證與陽明頗同但小有潮熱則不似陽明大熱從心上至少腹手不可近則陽明又不似此大痛因是辨其為太陽結胸兼陽明內實也緣誤汗復誤下重傷津液不大便而燥渴潮熱雖太陽陽明亦屬下證但太陽痰飲內結必用陷胸湯由胸脅以及胃腸蕩滌始無餘若但下腸胃結熱反遺胸上痰飲則非法矣其析義之精為如何哉結胸者項亦強如柔痓狀下之則和宜大陷胸丸原文結胸而至頸項亦強證愈篤矣蓋胸間邪結緊實項勢常昂有似柔痓之狀然痓病身手俱張此但項強原非痓也藉此以驗胸邪十分緊逼耳胸邪緊逼以大陷胸湯下之恐過而不留即以大陷胸丸下之又恐滯而不行故煮而連滓服之然後與邪相當而可施戰勝攻取之路觀方中用大黃芒硝甘遂可謂峻矣乃更加葶藶杏仁以射肺邪而上行其急煮時又倍加白蜜以留戀而潤導之而下行其緩必識此意始得用法之妙結胸證其脈浮大者不可下下之則死原文胸既結矣本當下以開其結然脈浮大則表邪未盡下之是令其結而又結也所以主死此見一病不堪再誤也結胸證具煩躁者亦死原文亦字承上見結胸證全具更加煩躁即不下亦主死也煩躁曷為主死耶蓋邪結於胸雖藉藥力以開之而所以載藥力上行者胃氣也胃氣充溢於津液之內汗之津液一傷下之津液再傷至熱邪搏飲結於當膺而津液又急奔以應上徵有不盡不已之勢煩躁者津液已竭胃氣垂絶之徵也堅敵在前營中士卒化為烏有能無敗乎此陷胸諸法見幾於蚤兢兢以滌飲為先務飲滌則津液自安如寇退而百姓復為良民也噫微矣不解肌誤汗下成痞復誤燒針合色脈以定死生一法太陽病醫發汗遂發熱惡寒因復下之心下痞表裡俱虛陰陽氣並竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈原文凡表裡差誤證變危篤有陰已亡而陽邪尚不盡者有陽邪盡而陽氣亦隨亡者有外邪將盡未盡而陰陽未至全虧者此可愈不可愈所由分也大率心下痞與胸間結雖有上下之分究竟皆是陽氣所治之位觀無陽則陰獨一語正見所以成痞之故雖曰陰陽氣並竭實由心下無陽故陰獨痞塞也無陽陰獨蚤已括傷寒誤下成痞大義安得草草讀過無陽亦與亡陽有別無陽不過陽氣不治復加燒針以逼劫其陰陽乃成危候其用藥逼劫即可同推中風誤下結胸傷寒誤下成痞者證之常也然中風誤下間有痞證傷寒誤下間有結胸證不可不明故次此條於結胸證後至太陽中篇亦次結胸於痞證後以求合作者之圓神也太陽經中篇凡寒傷營之證列於此篇法五十八條按上篇風傷衛之證用桂枝湯解肌者乃是不欲發汗以擾動其營也不擾其營但治其衛常有不及之弊不及則邪不盡去勢必傳入於裡故篇中兩解表裡之法居多此篇寒傷營之證用麻黃湯發汗者乃亟驅其邪盡從表出不使停留之法常有太過之弊太過則未免因邪傷正而虛候易生設有餘邪不盡者多未敢再汗但可和其營衛或俟其津回自然得汗故兩解表裡之法差少其誤下之證亦不比上篇之陽邪多變但發汗之後其人津液已虛更加誤下則津液重虛所以或邪少虛多而傷其陽或邪盛熱熾而傷其陰源同流異各造其偏以故治法亦錯出不一必先會大意然後一展卷而瞭然於心目也辨寒傷營有定脈定證總稱傷寒一法太陽病或已發熱或未發熱必惡寒體重嘔逆脈陰陽俱緊者名曰傷寒原文發熱惡寒體重嘔逆脈陰陽俱緊凡是傷寒病必具此五者故以為總稱或未發熱者寒邪初入尚未鬱而為熱頃之即熱矣多有服表藥後反增發熱者病必易解蓋熱鬱未久藥即領邪外出無里證故也仲景恐見惡寒體重嘔逆又未發熱認為直中陰經之證操刃殺人蚤於辨證之先揭此一語慮何周耶辨傷寒證用麻黃湯大綱一法太陽病頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘者麻黃湯主之原文上條已言傷寒之脈證矣此復以頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘互發其義蓋惡寒未有不惡風者頭身腰節疼痛即體重之應無汗而喘亦即嘔逆脈陰陽俱緊之應也汗乃血之液血為營營強則腠理閉密雖熱汗不出也麻黃髮汗散邪其力最猛故以桂枝監之甘草和之而用杏仁潤下以止喘逆然亦但取微似汗不須啜熱希粥正如馭六馬執轡惟謹恆虞其泛軼耳辨傷寒傳經不傳經一法傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也傷寒二三日陽明少陽證不見者為不傳也原文脈靜者邪在本經且不能遍故不傳經頗欲吐外邪內搏身煩脈數寒邪變熱必傳經也二三日陽明少陽證不見即誤治亦止留連於太陽耳辨傷寒欲傳不傳心悸而煩宜用建中一法傷寒二三日心中悸而煩者小建中湯主之嘔家不可用建中湯以甜故也原文欲傳未傳之證其人內實差可無慮若陽氣內虛而心悸陰氣內虛而心煩將來邪與虛搏必至危困建立其中氣則邪不易入即入亦足以御之也辨寒傷營之證當汗不汗反行針灸致變二法太陽傷寒者加溫針必驚也原文溫針欲以攻寒孰知針用火溫營血得之反增其熱營氣通於心引熱邪以內逼神明必致驚惶而神亂也脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名火逆也原文外邪挾火勢上炎必不下通陰分故重而痹也辨脈浮及浮數宜用麻黃湯發汗一法脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯原文傷寒之脈陰陽俱緊其脈但浮及浮數而不兼緊似可不用麻黃湯然寒既入營舍麻黃湯定法別非他藥可代故重申其意見脈緊固當用麻黃湯而脈浮不緊者乘其邪方在表當用麻黃湯托出其邪不使得入即脈浮數而不緊者乘其勢正欲傳當用麻黃湯擊其半渡而驅之使出參看中風證脈浮宜用桂枝湯可見天然一定之法不因邪勢之淺深輒可變易也服麻黃湯得汗後察脈辨證有次第不同三法一法汗解後復感復煩脈浮數者宜更藥解散一法脈浮數而煩加渴者宜兩解表裡一法具兩解證不渴者用藥宜里少表多傷寒發汗解半日許復煩脈浮數者可更發汗宜桂枝湯原文發汗後病解半日許復煩脈復浮數明系汗後表疏邪風襲入所致即不可再用麻黃湯宜更變發汗之法改用桂枝可耳用桂枝者一以邪重犯衛一以營虛不能復任麻黃也發汗已脈浮數煩渴者五苓散主之原文脈浮數而煩與上同也加之以渴則津液為熱所耗而內燥里證具矣津液內耗即非細故宜用四苓以滋其內而加桂以解其外比上更用桂枝之法又大不同者以無復感故也然既云兩解表裡之邪熱則五苓散中術用蒼桂用枝從可推矣按五苓兩解表裡之法風傷衛寒傷營俱用之傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之原文傷寒以無汗故煩汗出則不煩可知矣但汗出而渴則上條五苓兩解表裡之法在所必用若汗出而並不渴則里證本輕故用桂枝湯中之三五苓湯中之一少示三表一里之意名曰茯苓甘草湯以消息病情而分解微邪如璋判圭合允為寶符辨脈浮緊浮數尺脈反遲反微不可發汗二法一法脈浮緊身疼痛宜以汗解但尺遲則不可汗一法脈浮數即誤下仍當發汗但尺微則不可汗脈浮緊者法當身疼痛宜以汗解之假令尺中遲者不可發汗保以知之然以營氣不足血少故也原文脈浮而緊遍身疼痛乃傷寒正病亟當發汗以驅逐外邪者也設其人元氣素薄尺中脈遲則城郭不完兵甲不堅米粟不多根本先欲動搖尚可背城借一乎此所以必先建中而後發汗也脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裡虛須表裡實津液自和便自汗出愈原文脈浮數者法當從乎汗解故有更藥發汗及兩解表裡之法設經誤下而身重心悸縱脈仍浮數亦不可復發其汗但宜靜調俟其汗自出乃解耳所以然者以尺脈微里陰素虛故也必須津液自和即為表裡俱實便自汗出而愈此亦先建中而後發汗之變法要知仲景云尺脈微者不可發汗又云尺微者不可下無非相人津液之奧旨所以誤下之脈雖浮數不改亟宜發汗者亦必審諦其尺脈不當率意徑情有如此矣凡用發汗藥宜審病人有無宿疾不可徑汗六法咽喉乾燥者不可發汗原文咽中乾燥其人平日津液素虧可知故不可發汗以重奪其津液也叔和重集不可發汗篇有咽中閉塞不可發汗發汗則吐血氣欲絶手足厥冷欲得蜷臥不能自溫一條與此似同而實大異此戒發汗以奪陽明之津液彼戒發汗以奪少陰之血也又咽中閉塞不可下一條亦指少陰立説成注俱以咽門為胃之系混釋則謬矣淋家不可發汗發汗則便血原文小便淋者膀胱為熱所閉氣化不行也更發其汗則膀胱愈擾而血從小便出矣瘡家雖身疼痛不可發汗發汗則痓原文身疼痛為寒傷營之證本當發汗然瘡瘍之人肌表素虛營血暗耗更發其汗則外風襲虛內血不榮必致頸項強身手張而成痓痓亦膀胱之病也衄家不可發汗汗出必額上陷脈緊急目直視不能眴不得眠原文目得血而能視汗為血液衄血之人清陽之氣素傷更發其汗則額上必陷乃上焦枯竭之應也諸脈者皆屬於目筋脈緊急則目上瞪而不能合目不合則不得眠也傷寒發煩目瞑者必衄宜用麻黃湯發汗此言素慣衄血之人戒發汗以虛其虛宜兩諦之也亡血家不可發汗則寒栗而振原文亡血即亡陰也亡陰發汗本當生熱乃反寒栗而振者何耶蓋陰亡則陽氣孤而無偶才一發汗其陽必從汗盡越所以寒栗有加陰陽兩竭也汗家重發汗必恍惚心亂小便已陰疼與禹餘糧丸闕原文心主血汗者心之液平素多汗更發其汗則心臟之血傷而心神恍惚小腸之腑血亦傷而便已陰疼禹餘糧丸原方闕然生心血通水道可意會也服麻黃湯汗後病不解有惡寒惡熱不同治一法發汗病不解反惡寒者虛故也芍藥甘草附子湯主之發汗後惡寒者虛故也不惡寒但惡熱者實也當和胃氣與調胃承氣湯原文惡寒者汗出營衛新虛故用法以收陰固陽而和其營衛不惡寒者汗出表氣未虛反加惡熱則津干胃實可知故用法以泄實而和中然曰與似大有酌量其不當徑行攻下以重虛津液從可識矣服麻黃湯汗後身痛脈遲者宜行補散一法發汗後身疼痛脈沉遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之原文傷寒發汗後身反疼痛者乃陽氣暴虛寒邪不能盡出所致若脈見沉遲更無疑矣脈沉遲者六部皆然與尺遲大異尺遲乃素虛此為發汗新虛故於桂枝方中倍加芍藥生薑各一兩以去邪用人參三兩以輔正名曰新加湯者明非桂枝湯中之舊法也門人問相傳仲景全方止得一百一十二道因有新加一湯故名為一百一十三方其説然歟答曰此後人之囈語也仲景意中明明桂枝湯不欲與人參並用以桂枝能解肌表之邪人參反固肌表之邪故也然在誤汗誤下以後表裡參錯正氣虛微餘邪不解則有不得不並用之證如上篇太陽病外證未除而數下之遂協熱而利下痞硬表裡不解用桂枝理中湯乃革去理中之名但曰桂枝人參湯者即此意也人參尚主半表故曰新加理中則全不主表故革其名凡此皆仲景精微之蘊也然桂枝人參湯中去芍藥者以誤下而邪入於陰芍藥主陰不能散陽邪也桂枝新加湯中倍芍藥者以誤汗而陽虛邪湊恐陽孤無偶用芍藥以和之俾不至散亂也故用法必識立法之意斯用之各當矣服麻黃湯後不可誤用桂枝及飲水灌水過多一法發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯主之發汗後飲水多者必喘以水灌之亦喘原文誤用桂枝固衛寒不得泄氣逆變喘本當用大青龍湯此於湯中除去桂枝薑棗者以已經一誤不可再誤馭藥之嚴也然有大熱者恐兼里證若無大熱其為表邪實盛可知故變青龍之制為麻杏甘石乃為的對也飲水多者內有大熱則能消之汗后里證未具內無大熱故飲水多者水氣上逆必為喘也以水灌其外冷氣侵膚與內邪相搏亦主喘也即形寒飲冷傷肺之意但傷肺乃積漸所致此不過偶傷耳治法要不出麻杏甘石之外見內飲水多外行水灌皆足以斂邪閉汗不獨誤行桂枝湯為然矣本麻黃湯證誤下表邪未盡氣逆變喘一法下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯原文易桂枝以石膏少變麻黃之法以治誤汗而喘當矣乃誤下而喘亦以桂枝為戒而不越此方者何耶蓋太陽中風與太陽傷寒一從桂枝一從麻黃分途異治由中風之誤下而喘者用厚朴杏仁加入桂枝湯中觀之則傷寒之誤下而喘者用石膏加入麻黃湯中乃天造地設兩不移易之定法仲景所以諄諄告戒者正恐人以傷寒已得汗之證認為傷風有汗而誤用桂枝故特出誤汗誤下兩條示以同歸麻黃一治之要益見營衛分途而成法不可混施矣服麻黃湯後有陽氣暴虛叉手冒心二法一法心下悸欲得按一法耳聾無聞發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之原文發汗過多陽氣虛衰陽本受氣於胸中胸中陽氣不足故叉手冒心不説到陰血上方用桂枝甘草固表緩中亦未説到養血上注謂汗多則血傷血傷則心虛反置陽虛不理所謂迂闊而遠於事情也未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳聾無聞也所以然者以重發汗虛故如此原文此示人推測陽虛之一端也陽虛耳聾宜亟固其陽與少陽傳經邪盛之耳聾迥別矣服麻黃湯後有陽氣暴虛陰邪上逆臍下悸腹脹滿二法一法欲作奔豚預伐其邪一法行氣補益以除其滿發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之原文汗本心之液發汗後臍下悸者心氣虛而腎氣發動也腎邪欲上陵心故臍下先悸取用茯苓桂枝直趨腎界預伐其邪所謂上兵伐謀也發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之原文吐後腹脹與下後腹脹多為實以邪氣乘虛入里為實也若發汗後外已解而腹脹滿知非裡實之證由脾胃氣虛津液摶結陰氣內動壅而為滿也故以益胃和脾降氣滌飲為治也服麻黃湯汗後不由誤下津干飲結胃困變痞一法傷寒汗出解之後胃中不知心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之原文汗後外邪雖解然必胃氣安和始得脫然無恙以胃主津液故也津液因邪入而內結因發汗而外亡兩傷告匱其人心下必痞硬以伏飲摶聚胃氣不足以開之也胃病故乾噫食臭食入而噯餿酸也胃病故脅下有水氣水入而旁滲脅肋也胃中水穀不行腹中必雷鳴而搏擊有聲下利而清濁不分也雖不由誤下而且成痞設誤下其痞結又當何以耶上篇論結胸及痞之源云胃中空虛此云胃中不和互意以其未經誤下而致空虛但言不和然不和已足成痞胃氣所關之巨固若此哉誤下成痞用瀉心湯諸方次第不同四法一法誤下後再誤下客熱虛痞用甘草瀉心湯一法誤下後復發汗惡寒先解表後用大黃黃連瀉心湯一法陰氣協熱邪作痞用大黃黃連瀉心湯陰氣乘陽虛作痞用附子瀉心湯一法心下滿而不痛者用半夏瀉心湯作寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之原文此條痞證傷寒與中風互言大意具見下利完穀腹鳴嘔煩皆誤下而胃中空虛之互詞也設不知此義以為結熱而復下之其痞必益甚故重以胃中虛客氣上逆昭揭病因方用甘草瀉心湯者即生薑瀉心湯除生薑人參不用而倍甘草乾薑也客邪乘虛結於心下本當用人參以誤而再誤其痞已極人參仁柔無剛決之力故不用也生薑辛溫最宜用者然以氣薄主散恐其領津液上升客邪從之犯上故倍用乾薑代之以開痞而用甘草為君坐鎮中州庶心下與腹中漸至太寧耳今人但知以生薑代乾薑之僭孰知以乾薑代生薑之散哉但知甘草增滿孰知甘草能去滿哉傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯原文大下之後復發汗先里後表顛倒差誤究竟已陷之邪痞結心下證兼惡寒表邪不為汗衰即不可更攻其痞當用桂枝解肌之法先解其外外解已後乃以大黃黃連瀉心湯攻去其心下之痞也脈浮而緊而復下之緊反入里則作痞按之自濡但氣痞耳心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之心下痞而復惡寒汗出者附子瀉心湯主之原文傷寒脈浮而緊即不可下誤下而緊反入里則寒邪轉入轉深矣故作痞外邪與內飲摶結故心下滿硬若按之自濡而不滿硬則證不挾飲其所挾者乃身中之陰氣上逆而痞聚於心下也陰氣上逆惟苦寒可瀉之上條大黃黃連瀉心之法即為定藥若惡寒汗出前方必加入附子以救陽虛蓋否者乾往居內坤往居外所以宜切陰盛陽微之慮今惡寒汗出其事著矣故三黃湯內另煎附子汁和服以各成其事而共成傾否之功即一瀉心方中其法度森森若此傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡湯不中與之宜半夏瀉心湯原文半段當節入少陽篇中因有半夏瀉心湯之法不便分析故録全文上篇論結胸有陽明之兼證矣此復論結胸及痞有少陽之兼證見五六日嘔而發熱為少陽之本證然太陽未罷亦間有之所以陽明致戒云嘔多雖有陽明證不可攻以嘔屬太陽故也且發熱而非往來之寒熱尤難辨識果系少陽證則太陽證將罷不似陽明之不可攻若系太陽遷延未罷誤下即成痞結其為逆更大矣方用半夏瀉心湯者即生薑瀉心湯去生薑而君半夏也去生薑者惡其辛散引津液上奔也君半夏者瀉心諸方原用以滌飲此因證起於嘔故推之為主君耳服瀉心湯痞不解煩渴小便不利用五苓兩解表裡一法本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之原文瀉心諸方開結蕩熱益虛可謂具備乃服之而痞不解更加渴而口燥煩小便不利者前第九條五苓兩解表裡之法正當主用蓋其功擅潤津滋燥導飲蕩熱所以亦得為消痞滿之良治也服瀉心湯後復誤下利不止宜治下焦一法傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便原文湯藥者蕩滌腸胃之藥即下藥也誤下而下利不止心下痞硬服瀉心湯為合法矣乃復以他藥下之他藥則皆蕩滌下焦之藥與心下之痞全不相涉縱痞硬微除而關閘盡撤利無休止反取危困用理中以開痞止利原不為過其利益甚者明是以鄰國為壑徒重其奔迫也故用赤石脂禹餘糧固下焦之脫而重修其關閘倘更不止復通支河水道以殺急奔之勢庶水穀分而下利自止耳痞證汗出嘔吐下利用大柴胡湯兩解表裡一法傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之原文外邪不解轉入於裡心下痞硬嘔吐下利攻之則礙表不攻則里證已迫計惟主大柴胡一湯合表裡而兩解之耳汗吐下解後餘邪挾飲作痞用旋覆代赭石湯一法傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆代赭石湯主之原文此亦伏飲為逆但因胃氣虧損故用法以養正而兼散餘邪大意重在噫氣不除上既心下痞硬更加噫氣不除則胃氣上逆全不下行有升無降所謂弦絶者其聲嘶土敗者其聲噦也故用代赭領人參下行以鎮安其逆氣微加散邪滌飲而痞自開耳病人素有痞連臍脅更加痛引陰筋名為臟結一法病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死臟結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也原文傷寒有臟結之證乃陰邪結於陰也若加痛引少腹入陰筋則悖亂極矣故主死也無陽證者無表證也不往來寒熱者無半表半裡之證也其人反靜者並無里證也既無表裡之證而舌上仍有胎滑此為何故則以丹田有熱胸中有寒耳夫丹田陰也反有熱胸中陽也反有寒則是其病不在表裡而在上下上下之邪相悖而不相入所以不可攻也按病人素有動氣在當臍上下左右則不可發汗素有痞氣在脅下連臍旁則不可攻下醫工不細詢病家不明告因而貽誤者多矣甚有明知故犯者其操術可勝誅哉臟結之所以不可攻者從來置之不講以為仲景未嘗明言後人無從知之不知仲景言之甚明人第不參討耳夫所謂不可攻者乃垂戒之辭正欲人詳審其攻之之次第也試思臟已結矣匪攻而結胡由開耶前篇謂其外不解者尚未可攻又謂下利嘔逆不可攻又謂表解乃可攻痞言之已悉於此特出一訣謂臟結無陽證不往來寒熱其人反靜則證不在六經之表裡而在下焦上焦之兩途欲知其候但觀舌上有胎滑與否有之則外感之陽熱挾痞氣而反在下素痞之陰寒挾熱勢而反在上此與里證已具表證未除者相去不遠但其陰陽悖逆格拒而不入證轉凶危耳豈結胸者膈內拒痛而臟結者腹內不拒痛耶此而攻之是速其痛引陰筋而死也不攻則病不除攻之則死所以以攻為戒是則調其陰陽使之相入而胎滑既退然後攻之則熱邪外散寒氣內消其臟結將自愈矣此持危扶顛之真手眼也凡腹痛之證得藥而痛愈急者要當識此設問借結胸以明臟結之脈證一法問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸也何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈小細沉緊名曰臟結舌上白胎滑者難治原文臟結一證最難辨識復設問答借結胸以詳其脈證而明外邪熾盛者為難治結胸者陽邪結於陽也臟結者陰邪結於陰也然胸位高臟位卑其脈之寸浮關沉兩俱無異乃臟結之關脈更加小細緊者以關脈居上下二焦之界外邪由此下結積氣由此上干實往來之要衝所以病在下而脈反困於中也此證全以外受之邪定輕重若舌上有白胎滑則所感深重其互結之勢方熾單表單里及兩解表裡之法俱不可用所以難治然溫中散邪俾陰氣漸下而內消客邪漸上而外散兩相開解則良工之為其所難乎傷寒下早亦成結胸之證四法一法辨大結胸用大陷胸湯一法辨小結胸用小陷胸湯一法辨熱結在裡與結胸異一法辨邪熱在表心下支結單治其表太陽結胸證有少陽附篇第三十一條後傷寒六七日結胸熱實脈沉緊心下痛按之石硬者大陷胸湯主之原文傷寒誤下雖成痞亦時有結胸之候痞者十之八九結胸者十之一二也故次傷寒結胸於痞證之後此條熱實二字形容結胸之狀甚明見邪熱填實於胸間不散漫也上條言寸脈浮關脈沉此言脈沉緊更明蓋緊脈有浮沉之別浮緊主傷寒無汗沉緊主傷寒結胸與中風之陽邪結胸迥殊此所以不言浮也精矣精矣小結胸病正在心下按之則痛脈浮滑者小陷胸湯主之原文小結胸病正在心下則不似大結胸之高在心上也按之則痛比手不可近則較輕也而脈之浮又淺於沉滑又緩於緊可見其人外邪陷入原微但痰飲素盛挾勢邪而內結所以脈見浮滑也黃連半夏栝蔞實藥味雖平而泄熱散結亦是突圍而入所以名為小陷胸湯也傷寒十餘日熱結在裡復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之原文治結胸之證取用陷胸之法者以外邪挾內飲摶結胸間未全入於裡也若十餘日熱結在裡則是無形之邪熱蘊結必不定在胸上加以往來寒熱仍兼半表當用大柴胡湯以兩解表裡之熱邪於陷胸之義無取矣無大熱與上文熱實互意內陷之邪但結胸間而表裡之熱反不熾盛是為水飲結在胸脅其人頭有微汗乃邪結在高而陽氣不能下達之明徵此則主用大陷胸湯允為的對也仲景辨證明徹若此後人反謂結胸之外復有水結胸一證又謂下文支結乃支飲結聚亦另是一證可笑極矣傷寒六七日發熱微惡寒支節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之原文妙哉仲景之文此一條又足緯上三條而明其意心下支結者邪結於心下之偏旁不正中也比小結胸之正在心下又較輕矣傷寒至六七日宜經傳已遍乃發熱微惡寒肢節煩疼微嘔其邪尚在三陽之界未入於裡雖心下支結而外證未除即不可用大陷胸湯以大陷胸湯主裡而不主表也亦不可用小陷胸湯以小陷胸湯主飲而不主表也夫支結之邪其在外者方盛其陷入者原少故但合用柴胡桂枝和解二法以治其表表邪去而支結自開矣後人謂支結乃支飲結於心下夢語喃喃吾不識支飲為何物也辨下後胸滿煩驚身重困篤一法傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之原文此伏飲素積為變之最巨者蓋積飲之人津液素結原不足以充灌周身及遇外感一切汗吐下定法漫難輕試其誤下之變更有進於結胸者似此一證八九日過經乃下之可謂慎矣孰知外邪未盡乘虛而陷積飲挾之填滿胸中胸中既滿則膻中之氣不能四布而使道絶使道絶而君主孤危所以心驚而神亂也煩與譫語本屬胃此則兼心小便不利本屬津液內竭此亦兼小腸火燔一身盡重不可轉側者又神明內亂治節不行百骸無主之明徵也夫邪方在表裡其患已及神明於此而補天浴日寧復尋常表裡所辨故用人參茯苓之補以益心虛丹鉛之重以鎮心驚龍骨牡蠣之澀以為載神之舟楫一方而批郤導窾全收安內攘外之功後人不察謂是總三陽而和之之法豈其然哉按傷寒雖云傳足不傳手其實原無界限此證手少陰心主為邪所逼神明內亂因致譫語無倫較他症譫語之屬胃實者相去懸絶若復以治足經之法治之必無幸矣方中藥止九味用入心藥五種不以為復且用非常藥三種不以為猛蓋都城震動勢必悉力入援非孤注可圖僥幸也至於痰飲搏膈最為剝床者但用半夏一味表邪內襲首發難端者但從太少之例用桂枝柴胡二味陽邪入陰最宜急驅者但用大黃一味是則治傷寒吃緊之處咸落第二義止從治心諸藥之後一案共結其局此等手眼豈凡近可識耶病久脈結代心動悸宜補胃生津兼散邪一法傷寒脈結代心動悸者炙甘草湯主之一名復脈湯脈按之來緩而時一止復來者名曰結又脈來動而中止更來小數中有還者反動名曰結陰也脈來動而中止不能自還因而復動名曰代陰也得此脈者必難治原文傷寒病而至脈結代心動悸真陰已亡微邪摶聚者欲散不散故立炙甘草湯補胃生津潤燥以復其脈少加桂枝以和營衛少加清酒以助藥力內充胃氣外達肌表不驅邪而邪自無可容矣後段本為結代二脈下注腳後人不解疑為闕文但以虛多實少混説殊不知脈者氣血之先仲景於津液內亡之脈名之為結陰代陰又名無陽原有至理何得懵然不識聊為四言俚句以明其義胃藏津液水穀之海內充藏府外灌形骸津多脈盛津少脈衰津結病至津竭禍來脈見微弱宜先建中汗則津越下則津空津耗脈和不可妄攻小便漸減大便自通陽明內實急下救焚少緩須臾津液無存陽明似實少用調承驅熱存津此法若神腎中真陽陰精所栽胃中真陽津液所胎津枯精盛冽泉可溉陰精衰薄瓶罄罍哀何謂結陰無陽脈闔何謂代陰無陽脈奪經揭無陽津液所括較彼亡陽天地懸闊誤下下利不止身疼痛宜先救里後救表一法傷寒醫下之續得下利清穀不止身疼痛者急當救里後身疼痛清便自調者急當救表救里宜四逆湯救表宜桂枝湯原文下利清穀者脾中之陽氣微而飲食不能腐化也身體疼痛者在裡之陰邪盛而筋脈為其阻滯也陽微陰盛凶危立至當急救其在裡之微陽俾利與痛而俱止救後小便清大便調則在裡之陽已復而身痛不止明是表邪未盡營衛不和所致又當急救其表俾外邪仍從外解而表裡之辨始為明且盡耳救里與攻裡天淵若攻裡必須先表后里必無倒行逆施之法惟在裡之陰寒極盛恐陽氣暴脫不得不急救其里俟里證少定仍救其表初不敢以一時之權宜更一定之正法也厥陰篇下利腹脹身體疼痛者先溫其里乃攻其表曰先溫曰乃攻形容不得已之次第足互此意辨誤下引邪內入用梔子湯取吐三法一法下後煩滿不安用梔子厚朴湯一法誤用丸藥大下身熱微煩用梔子乾薑湯一法大下後身熱心下結痛用梔子豉湯傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之原文滿而不煩即里症已具之實滿煩而不滿即表症未罷之虛煩合而有之且臥起不安明是邪湊胸表腹裡之間無可奈何之象故取梔子以快湧其邪而合厚朴枳實以泄腹中之滿亦表裡兩解之法也傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之原文丸藥大下徒傷其中而不能蕩滌其邪故梔子合乾薑用之亦溫中散邪之法也傷寒五六日大下之後身熱不去心中結痛者未欲解也梔子豉湯主之發汗若下之而煩熱胸中窒者梔子豉湯主之發汗吐下後虛煩不得眠若劇者必反覆顛倒心中懊憹者梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之凡用梔子湯病人舊微溏不可與服之原文香豉主寒熱惡毒煩躁滿悶下後身熱不去心中結痛則表邪昭著與前條之微煩不同故以梔子合香豉解散餘邪又主表而不主裡之法也然此梔豉一法諸凡汗下後症顯實煩虛煩之不同要皆可用以其胸中窒塞即名實煩窒比心中結痛則較輕也以其身外熱除心中不窒止是虛熱內壅即名虛煩虛煩不得眠亦即臥起不得安之互詞反復顛倒心中懊憹熱邪逼處無法可除故用梔豉湯以湧其餘熱乃因汗吐下後胸中陽氣不足最虛之處便是容邪之處正宜因其高而越之耳若慮津液內竭正氣暴虛餘邪不盡則仲景原有炙甘草湯一法寧敢妄湧以犯虛虛之戒耶執一而妄注只令作者之意盡失可惱可惱舊微溏則大腑易動服此湯不能上湧反為下泄矣緣內經有先泄而後生他病者治其本必先調之後乃治其他病故此示戒辨下後復發汗之脈症及晝夜靜躁二法下之後復發汗必振寒脈微細所以然者以內外俱虛故也原文治傷寒有先汗後下之次第原不得已之法設下之後外邪不盡復不得已而發其汗其人身必振寒脈必微細邪雖去而內外俱虛所傷滋大矣良工於汗下之際已不可無集木臨谷之俱況以誤治致虛更可再誤而犯虛虛之戒乎注以振寒屬誤汗脈微細屬誤下且牽入亡陽亡陰蔓語殊失仲景叮嚀之意下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱者乾薑附子湯主之原文上條但言振寒及微細之脈未定所主之病以虛症不一也然振寒脈微細陽虛之故已露一斑設晝日煩躁不得眠其為陽虛擾亂可知矣其人夜反安靜不嘔不渴則陽虛擾亂不兼外邪可知矣乃復以脈沉微身無大熱重加辨別者仲景意中恐新邪乘虛暗襲耳外無邪襲則煩躁為亡陽之候而乾薑附子在所必用矣即此而推其人日中安靜夜多煩躁則陽不病而陰病可知矣然陰病乃傷寒後之本症自有陽邪入陰及陰氣內虧津液未復之條故不復互言之也辨吐下後復汗身為振搖動惕久成痿廢二法一法胸高頭眩脈沉緊加誤汗動經宜囁通津液一法飲搏胸脅經脈動惕久成痿廢傷寒若吐若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝術甘草湯主之原文心下逆滿氣上衝胸寒邪搏飲塞湧於膈所以起則頭眩脈見沉緊明系飲中留結外邪若但發汗以強解其外外雖解而津液盡竭反足傷動經脈有身為振搖之患矣蓋人身經脈賴津液以滋養吐下而津液一傷更發其汗津液再傷坐令經脈失養身為振搖貽害深矣所以遇此等症必一方之中滌飲與散邪並施乃克有濟太陽第三篇中用小青龍湯全是此意但彼症風寒兩受不得不重在表此症外邪已散止存飲中之邪故以桂枝加入制飲藥內俾飲中之邪盡散津液得以四布而滋養其經脈千百年來孰解其批郤導窾之微旨乎傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成痿原文此即上條之症而明其增重者必致廢也曰虛煩曰脈甚微則津液內亡求上條之脈沉緊為不可得矣曰心下痞硬曰脅下痛較上條之心下逆滿更甚矣曰氣上衝咽喉較上條之沖胸更高矣外症痰飲搏結有加而脈反甚微不與病情相協為日既久則四屬失其滋養此後非不有飲食漸生之津液然久不共經脈同行其旁滲他溢與飲同事可知其不能復榮經脈可知所以竟成痿也按汗下吐三法差誤陰陽並竭變症蠡起如心悸頭眩身瞤動面色青黃四肢難以屈伸等症本篇言之不一皆是教人對症急治不可因循以貽禍患如此一症心下痞硬太陽之邪挾飲上逆也脅下痛少陽之邪挾飲上逆也逆而不已上衝咽喉逆而不已過頸項而上衝頭目因而眩冒有加則不但身為振搖其頸項間且陽虛而陰湊之矣陰氣劑頸反不得還乃至上入高巔則頭愈重而益振搖矣夫人身之筋脈全賴元氣與津液為充養元氣以動而漸消津液以結而不布上盛下虛兩足必先痿廢此仲景茯苓桂枝白朮甘草湯於心下逆滿氣上衝胸之日早已用力乎辨傷寒熱瘀小便反利為蓄血用抵當丸一法傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸原文傷寒蓄血較中風蓄血更為凝滯故變上篇之抵當湯為丸煮而連滓服之與結胸項強似柔痓用大陷胸丸同意蓋湯者蕩也陽邪入陰一蕩滌之即散丸者緩也陰邪入陰恐蕩滌之而不盡故緩而攻之所以求功於必勝也其曰不可余藥者即本湯不變為丸不可得矣辨傷寒風濕相搏身體煩疼脈症二法傷寒八九日風濕相搏身體煩疼不能自轉側不嘔不渴脈浮虛而澀者與桂枝附子湯主之若其人大便硬小便自利者去桂枝加白朮湯主之原文風木濕土雖天運六氣中之二氣然而濕土實地之氣也經云地氣之中人也下先受之其與風相搏結止是流入關節身疼極重而無頭疼及嘔渴等症故雖浸淫於周身軀殼自難犯高巔藏府之界耳不嘔者上無表邪不渴者內非熱熾也加以脈浮虛而澀則為風濕搏於軀殼無疑故用桂枝附子疾馳經絡水道以迅掃而分竭之也風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之原文此條復互上條之意而辨其症之較重者痛不可近汗出短氣惡風不欲去衣小便不利或身微腫正相搏之最劇處故於前方加白朮以理脾而下滲其濕減薑棗之和中以外泄其風要皆藉附子之大力者負之而走耳辨傷寒發黃有寒濕相搏四法傷寒發汗已身目為黃所以然者以寒濕在裡不解故也以為不可下也於寒濕中求之原文傷寒發汗已熱邪解矣何由反蒸身目為黃所以然者寒濕搏聚適在軀殼之裡故爾發黃也里者在內之通稱非謂寒濕深入在裡蓋身目正屬軀殼與藏府無關也於寒濕中求之即下文三法也傷寒瘀熱在裡身必發黃麻黃連翹赤小豆湯主之原文傷寒之邪得濕而不行所以熱瘀身中而發黃故用外解之法設泥里字豈有邪在裡而反治其表之理哉傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之原文黃色鮮明其為三陽之熱邪無疑小便不利腹微滿乃濕家之本症不得因此指為傷寒之裡症也方中用大黃者取佐茵陳梔子建驅濕除熱之功以利小便非用下也傷寒身黃發熱者梔子柏皮湯主之原文熱已發出於外自與內瘀不同正當隨熱勢清解其黃俾不留於肌表間也前條熱瘀故用麻黃此條發熱反不用麻黃者蓋寒濕之證難於得熱熱則其勢外出而不內入矣所謂於寒濕中求之不盡泥傷寒定法此非一徵歟用三法以驅傷寒發黃於寒濕中求之能事畢矣設不知此妄行攻下其邪乘虛陷入陽明中土日與水穀相蒸身目之黃有加無已漸致沉錮不返者多矣此仲景所為叮嚀不可下之意乎同一濕也與風相摶則為掣痛與寒相結則發黃以俱太陽表邪故戒不可下叔和不察將寒濕編入陽明之末未免與不可下之旨相悖今悉歸太陽求不違先聖矩矱云太陽經下篇凡風寒兩傷營衛之證列於此篇法二十四條按上篇太陽中風乃衛病而榮不病之證中篇太陽傷寒乃榮病而衛不病之證然天氣之風寒每相因人身之榮衛非兩截病則俱病者恆多逮俱病則邪勢孔熾其人必增煩躁非發汗不解故仲景取用青龍之法乃內經陽之汗以天地之雨名之之義也但青龍為神物最難駕馭必審其人無少陰脈證乃可用之以少陰亦主煩躁故也因是更立真武一湯以救青龍之誤投白虎一湯以匡青龍之不逮神方畢用所謂神乎其神者矣有志精義入神之學者請自茲篇證入用大青龍湯詳辨脈證大綱二法太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服服之則厥逆筋惕肉瞤此為逆也原文天地鬱蒸得雨則和人身煩躁得汗則解大青龍湯證為太陽無汗而設與麻黃湯證何異因有煩躁一證兼見則非此法不解蓋風為煩寒為躁故用之發汗以解其煩躁也究竟本方原於無汗者取微似汗若有汗者之煩躁全非鬱蒸之比其不藉汗解甚明加以惡風脈微弱則是少陰亡陽之證若脈浮弱汗出惡風而不煩躁即是太陽中風之證皆與此湯不相涉也誤服此湯寧不致厥逆惕瞤而速其陽之亡耶仲景不能必用法者盡如其法更立真武一湯以救其誤學者能識其鄭重之意即百用不致一誤矣特為剖析疑義相與明之按解肌兼發汗而取義於青龍者龍升而云興云興而雨降鬱熱頓除煩躁乃解匪龍之為靈何以得此乎觀仲景制方之意本是桂枝麻黃二湯合用但因芍藥酸收為興龍致雨所不宜故易以石膏之辛甘大寒辛以散風甘以散寒寒以勝熱一藥而三善具備且能助青龍升騰之勢所以為至當至神之法也然而去芍藥之酸收增石膏之辛散外攻之力猛而難制在寒多風少及風寒兩停之證則用當而通神其有風無寒之證及微弱之脈若不知辨而概用之有厥逆惕瞤而亡陽耳此疏庸之輩所為望而畏之乎詎知仲景於風多寒少之證而見微弱之脈有用桂枝二越婢一之法桂枝全方不去芍藥取用其二全是不欲發汗之意復改麻黃一湯為越婢一者略用麻黃石膏二物示微發於不發之中耳夫婢女子之卑者也女子固以順為正況於婢則惟所指使更無專擅矣以大青龍之升騰變化不可駕馭之物約略用之乃至性同女婢之卑柔此仲景通天手眼也只一方中忽焉去芍藥為大青龍而升天興雲雨忽焉存芍藥為小青龍而蟠泥潤江海忽焉用桂枝二越婢一而細雨濕泥沙精義入神之道比仙經較著矣後人不窺作者之藩安望其能用之也哉再按誤服大青龍湯厥逆筋惕肉瞤者既有亡陽之逆矣亡陽即當用四逆湯以回陽乃置而不用更推重真武一湯以救之者其義何居蓋真武乃北方司水之神龍惟藉水可能變化而水者真武之所司也設真武不與之以水青龍之不能奮然升天可知矣故方中用茯苓白朮芍藥附子行水收陰醒脾崇土之功多於回陽名之曰真武湯乃收拾分馳離絶之陰陽互鎮於少陰北方之位其所收拾者全在收拾其水使龍潛而不能見也設有一毫水氣上逆龍即得遂其升騰變化縱獨用附子乾薑以回陽其如魄汗不止何哉厥後晉旌陽祖師以仙斬蛟捕至蛟龍遁迹之所戒其家勿蓄勺水乃至從硯水中逸去可見水怪原有尺水丈波之能向非真武坐鎮北方天壤間久為龍蛇之窟矣即此推之人身陽根於陰其亡陽之證乃少陰腎中之真陽飛越耳真陽飛越亟須鎮攝歸根陽既歸根陰必翕然之從陰從則水不逆矣陰從則陽不孤矣豈更能飛越乎故舍天人一致之理以談醫者非其至也後賢用附子為末以止陰躁名曰霹靂散藥雖善而名則可笑夫陰躁正厥逆瞤惕之候而霹靂又青龍行雨之符以是名方其違聖悖理可勝道哉傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯發之原文前條太陽中風四字括上篇而言此條傷寒二字括中篇而言風寒之脈證錯見則桂枝湯與麻黃湯為不可用不待言矣故二條反復互明大青龍湯允為風寒兩兼的對之藥也無少陰證成注謂不久厥吐利無少陰里證夢語喃喃誤人最大仲景來文但重乍有輕時六字蚤已挈明言但身重而無少陰之欲寐其為寒因可審況乍有輕時不似少陰之晝夜俱重又兼風因可審所以敢恣行無忌力驅其在表之風寒若脈微弱身重欲寐則內顧少陰且不遑矣敢發之乎細玩二條文意傷風脈本浮緩反見浮緊傷寒脈本浮緊反見浮緩是為傷風見寒傷寒見風兩無疑矣既無可疑又當辨無少陰證相雜則用青龍萬舉萬當矣故脈見微弱即不可用大青龍湯以少陰病脈必微細也方注泥弱字牽入中風之脈陽浮陰弱為解大失仲景叮嚀垂戒之意不思中風之脈以及誤汗等證太陽上篇已悉此處但歸重分別少陰以太陽膀胱經與少陰腎經合為表裡膀胱邪勝腎切震鄰其在陰精素虛之人表邪不俟傳經蚤從膀胱之府襲入腎藏者有之況兩感夾陰等證臨病尤當細察設少陰不虧表邪安能飛渡而見身重欲寐等證耶故有少陰證者不得已而行表散自有溫經散邪兩相綰照之法豈可徑用青龍之猛立鏟孤陽之根乎仲景豎此一義用法之妙已竭盡無餘後人顛倒無傳妄行注釋致令察脈辨證之際懵然不識要妙只覺仲景之堂無階可升其治虛勞發熱骨蒸多汗每輕用升柴恣行表散遵依東垣升陽散火乃至百不救一今與英賢商確仲景法豈非民生之一幸歟青龍項中脈見浮緊日久致衄用麻黃湯次第三法太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在此當發其汗服藥已微除其人發煩熱目瞑劇者必衄衄乃解所以然者陽氣重故也麻黃湯主之原文此風多寒少之證服藥已微除則藥不勝病可知發煩者熱蒸而鬱煩也目瞑者熱轉榮血肝氣不治也劇則熱甚於經必迫血妄行而為衄衄則熱隨血散而解也陽氣重者風屬陽而入衛氣為寒所持故重也所以雖得衄解仍主麻黃湯以發其未盡之沉滯而大變乎中風之例也太陽病脈浮緊發熱身無汗自衄者愈原文此即前條風多寒少之證但無身疼痛則寒證較輕又無發煩目瞑則陽氣亦不重自衄即愈比前衄乃解亦易安所以既衄則不更主麻黃湯也傷寒脈浮緊不發汗因致衄者麻黃湯主之原文此寒多風少之證也寒多不發汗所以致衄既衄則風邪得解所以惟用麻黃湯以發其未散之寒而但從傷寒之例也青龍項中狀如瘧表裡虛禁汗吐下用各半湯一法太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈微緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其不能得小汗出身必癢宜桂枝麻黃各半湯原文此亦風多寒少之證以其風雖外薄為寒所持而不能散所以面顯怫鬱之熱色宜總風寒而兩解之也青龍項中脈微弱為無陽用桂枝二越婢一湯一法太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯原文此亦風多寒少之證無陽二字仲景言之不一後人不解皆置為闕疑不知乃亡津液之通稱也故以不可更汗為戒然非汗則風寒終不解惟取桂枝之二以治風越婢之一以治寒乃為合法越婢者石膏之辛涼也胃得之則熱化津生以此兼解其寒柔緩之性比女婢猶為過之可用之無恐矣青龍項中汗出不解用桂枝二麻黃一湯一法服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯原文此亦風多寒少之證服桂枝湯治風而遺其寒汗反大出脈反洪大似乎風邪再襲故重以桂枝湯探之若果風邪之故立解矣若形如瘧日再發則邪本欲散又且淺而易散其所以不散者終為微寒所持故略兼治寒而汗出必解也青龍項中辨表裡用桂枝湯單解風邪一法傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裡仍在表也當鬚髮汗若頭痛者必衄宜桂枝湯原文六七日不大便明系裡熱況有熱以證之更可無疑故雖頭痛可用承氣下之若小便清者邪未入里即不可下仍當發汗以散表邪然頭痛有熱多是風邪上壅勢必致衄若兼寒邪則必如第二類之身疼痛目瞑何以但頭痛而無身目之證耶故惟用桂枝湯以解風邪與用麻黃湯之法各別也青龍項中風寒挾飲微結桂枝合五苓加減一法服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯主之原文服桂枝湯治風而遺其寒所以不解而證變設更下之則邪勢乘虛入里益誤矣在表之風寒未除而在裡之水飲上逆故變五苓兩解表裡之法而用茯苓白朮為主治去桂者以已誤不可復用也然桂枝雖不可用其部下諸屬皆所必需倘並不用芍藥以收陰甘草薑棗以益虛而和脾胃其何以定誤汗誤下之變耶故更一主將而一軍用命甚矣仲景立方之神也青龍項中火迫亡陽用桂枝湯加減救逆一法傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝去芍藥加蜀漆龍骨牡蠣救逆湯主之原文此條文義甚明後人不識作者之意雖有良法而不能用茲特闡之篇首誤服大青龍湯厥逆筋惕肉瞤而亡陽者乃汗多所致故用真武湯救之此以火迫劫而亡陽者乃方寸元陽之神被火迫劫而飛騰散亂故驚狂起臥不安有如此者少緩須臾駟馬莫追神丹莫挽矣故用此湯救之桂枝湯中除去芍藥人皆不知其故或謂惡其酸收非也夫神散正欲其收何為見惡耶設不宜於芍藥之酸又何宜於龍骨牡蠣之澀耶學者於此等處當猛下一參透此一關勝讀方書千卷蓋陽神散亂當求之於陽桂枝湯陽藥也然必去芍藥之陰重始得疾趨以達於陽位既達陽位矣其神之驚狂者漫難安定更加蜀漆為之主流則神可賴之以攸寧矣緣蜀漆之性最急丹溪謂其能飛補是也更加龍骨牡蠣有形之骨屬為之舟楫以載神而反其宅亦於重以鎮怯澀以固脫之外行其妙用如是而後天君復辟聿追晉重耳越勾踐返國之良圖矣仲景制方豈易識哉青龍項中火逆煩躁用桂枝甘草龍骨牡蠣湯一法火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之原文此證誤而又誤雖無驚狂等變然煩躁則外邪未盡之候亦真陽欲亡之機故但用桂枝以解其外龍骨牡蠣以安其內不用蜀漆者以元神未致飛越無取急追以滋擾也青龍項中誤用桂枝治風遺寒治表遺里救變一法傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中干煩躁吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其腳即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之原文此段辨證用法最精最詳從前不得其解今特明之脈浮自汗固是在表之風邪而小便數心煩則邪又在裡加以微惡寒則在裡為寒邪更加腳攣急則寒邪頗重矣乃用桂枝湯獨治其表則陽愈虛陰愈無制故得之便厥也桂枝且誤麻黃更可知矣大青龍更可知矣陰寒內凝總無攻表之理也甘草乾薑湯復其陽者即所以散其寒也厥愈足溫不但不必治寒且慮前之辛熱有傷其陰而足攣轉錮故隨用芍藥甘草以和陰而伸其腳設胃氣不和而譫語則胃中津液亦為辛熱所耗故少與調胃承氣湯以和胃而止其譫多與則為下而非和矣若不知此證之不可汗而重發其汗復加燒針則陽之虛者必造於亡陰之無制者必至犯上無等此則用四逆湯以回其陽尚恐不勝況可兼陰為治乎問曰證象陽旦按法治之而增劇厥逆咽中干兩脛拘急而譫語師言夜半手足當溫兩腳當伸後如師言何以知此答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中干煩躁陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯爾乃脛伸以承氣湯微溏則止其譫語故知病可愈原文附答門人問辭求正四方道契門人問曰證象陽旦成注謂是桂枝之別名方注謂陽以風言旦曉也似中風分曉以不啻中風故設難詳申其義一主藥一主證二家未知孰是答曰主藥則既名桂枝云何別名陽旦是必一百一十三方方方皆有別名然後可主證則既似中風復云不啻中風果為何證且訓旦為曉尤為牽強不通二家於此等大關係處尚且昏昏後學安得不面牆耶夫仲景之圓機活法妙在陽旦陰旦二湯陽旦者天日晴暖以及春夏溫熱之稱也陰旦者風雨晦冥以及秋冬涼寒之稱也只一桂枝湯遇時令溫熱則加黃芩名陽旦湯遇時令涼寒則加桂名陰旦湯後世失傳紛紛謂桂枝不宜於春夏者皆由不識此義耳即如此證既象陽旦又云按法用之即是按用桂枝加黃芩之法也所以病人得之便厥明明誤在黃芩助其陰寒若單服桂枝湯何至是耶故仲景即行陰旦之法以救其失觀增桂令汗出一語豈不昭昭耶陰旦不足更加附子溫經即咽中干陽明內結譫語煩亂渾不為意且重飲甘草乾薑湯以俟夜半陽回足熱後果如其言豈非先有所試乎惟黃芩入口而便厥未幾即以桂附乾薑尾其後固知其厥必不久所以可斷云夜半手足當溫況咽乾譫語熱證相錯其非重陰沍寒可知故才得足溫即便以和陰為務何其審哉今與二三同調抵掌談仲景當年治病機宜愧無旨酒滿浮大白耳青龍項中汗下後煩躁將欲亡陽宜補虛回陽一法發汗若下之病仍不解煩躁者茯苓四逆湯主之原文煩躁本大青龍湯證然脈弱汗出惡風者誤服之則厥筋惕肉瞤首條已諄諄致戒矣此條復申其辨見汗下不解轉增煩躁則真陽有欲亡之機而風寒之邪在所不計當用茯苓人參乾薑附子溫補兼行以安和其欲越之陽俾虛熱自退煩躁自止乃為合法若因煩躁更加散邪則立斃矣夫不汗出之煩躁與發汗後之煩躁毫釐千里不汗出之煩躁不辨脈而誤投大青龍尚有亡陽之變是則發汗後之煩躁即不誤在藥已誤在汗矣此仲景所為見微知著仿真武之例更加人參之補以默杜其危哉下後煩躁較未下之煩躁亦殊青龍項中風寒兼見寒熱兩壅宜分散陰陽一法傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之原文胸中有熱風邪在上也胃中有邪氣寒邪在中也腹中痛陽邪欲下而不得下也欲嘔吐陰邪欲上而不得上也此所以知其熱邪中下寒邪中下陰陽各不相入失其升降之恆故用黃連湯以分理陰陽而和解之也嘗因此法而推及臟結之證舌上有胎者又為寒反在上熱反在下陰陽悻逆既成危候仲景但戒以不可攻未言治法然非先之以和解將立視其死乎學者請於黃連湯著眼詳見太陽中篇臟結條青龍項中辨脈證之縱橫而刺其經穴二法傷寒腹滿譫語寸口脈浮而緊此肝乘脾也名曰縱刺期門原文期門二穴在不容兩旁各去同身寸之一寸五分肝之募也肝木乘脾土名曰縱其證腹滿譫語其脈寸口浮而緊寸口即氣口脾胃脈之所主也浮而且緊即弦脈也肝木過盛所以脾胃之土受制也傷寒發熱嗇嗇惡寒大渴欲飲水其腹必滿自汗出小便利其病欲解此肝乘肺也名曰橫刺期門原文肝脈乘肺金名曰橫發熱嗇嗇惡寒者太陽之本證也大渴飲水者木盛則熱熾而求水以潤之也木得水助其勢益橫反侮所不勝而上乘乎肺水勢泛濫其腹必滿然肺金素無他病者必能暗為運布或自汗而水得外滲或小便利而水得下行其病欲解也亦由但腹滿而不譫語故易解耳直貫上下曰縱眠亙兩旁曰橫木本剋土而乘乎土其事直故為縱木受制於金而反乘金其事不直故曰橫直則難愈不直則易安理之常也然縱橫之證不同而同刺期門穴者以賊土侮金皆由木盛腹滿譫語證涉危疑故亟以瀉木為主治也用小青龍湯外散風寒內滌水飲二法傷寒表不解心下有水氣乾嘔發熱而咳或渴或利或噎或小便不利少腹滿或喘者小青龍湯主之原文風寒不解心下有水氣水即飲也水寒相搏必傷其肺或為多證者人身所積之飲或上或下或中或熱或冷各不相同而肺同為總司但有一二證見即水逆之應也於散風寒滌水飲藥中加五味子之酸以收肺氣之逆乾薑之辛以瀉肺氣之滿名曰小青龍湯蓋取其翻波逐浪以歸江海不欲其興云升天而為淫雨之意也後人謂小青龍湯為發汗之輕劑毋乃味其旨乎傷寒心下有水氣咳而微喘發熱不渴服湯已渴者此寒去欲解也小青龍湯主之原文風寒挾水飲上逆津液不下行故不渴渴則可知津液不逆為寒去欲解之徵也寒去欲解仍用小青龍湯與上篇脈見單浮用桂枝湯中篇脈見單浮用麻黃湯同意大率以輕劑助其欲解之勢耳按桂枝麻黃湯無大小而青龍湯有大小者以桂枝麻黃之變法多大青龍之變法不過於麻桂二湯內施其化裁或增或去或饒或減其中神化莫可端倪又立小青龍一法散邪之功兼乎滌飲取義山澤小龍養成頭角乘雷雨而翻江攪海直奔龍門之意用以代大青龍而擅江河行水之力立法成大備也因經叔和之編次漫無統紀昌於分篇之際特以大青龍為綱於中桂麻諸法悉統於青龍項下擬為龍背龍腰龍腹然後以小青龍尾之或飛或潛可弭可伏用大用小曲暢無遺居然仲景通天手眼馭龍心法矣更復顧名思義清其血脈於青龍尾後方綴白虎為之對待俾觀者知神用無方爽然有會表章之餘聊資啓發云或問青龍自為一隊即白虎且剔出另峙其後然則脈證之縱橫何與青龍事耶答曰此等奧義惟作者知之傷寒多有忽然自汗突爾亡陽之候雖不用青龍之藥蚤已犯青龍之逆者矣況腹滿則陰盛可知譫語則陽虛可慮仲景特挈縱橫以名之者豈無説耶蓋屈蠖者龍之所以伏也縱橫者龍之所以飛也縱橫之脈證不同刺穴同用期門期門乃肝木所主東方青龍之位也刺其穴者正所以制龍木而預弭亡陽之變耳故一青龍方中張大其施則升行而為霖雨狹小其制則鼓浪而奔江海馴其性能則逾越女婢之卑柔刺其經穴則消弭靈幻於寂若仲景於其奮髯升天萬難把捉之時尚以真武一法坐鎮北方之水俾地氣不上天氣不下所謂其雨其雨杲杲日出龍之既升於天者且不得不復返於淵況未及升騰可馴可撫顧無法以制伏之耶此余所為有會於縱橫之義也倘不其然匪但無與青龍之事亦並無與傷寒之事矣昔有善畫龍者舉筆凝思而青天忽生風雨吾不知仲景制方之時其為龍乎其為仲景乎必有倏焉雷雨滿盈倏焉密雲不雨倏焉波浪奔騰倏焉天日開朗以應其生心之經綸者神哉青龍等方即擬為九天龍經可矣婁東胡卣臣先生昌所為賢士大夫也夙苦痰飲為恙夏月地氣上升痰即內動設小有外感膈間痰即不行兩三日瘥後當膺尚結小痤無醫不詢無方不考乃至夢寐懇求大士救療因爾聞疾思苦深入三摩地位薦分治病手眼今且仁智兼成矣昌昔謂膀胱之氣化大行地氣不升則天氣常朗其偶受外感則仲景之小青龍一方與大士水月光中大圓鏡智無以異也蓋無形之感挾有形之痰互為膠漆其當胸窟宅適在太陽經位惟於麻桂方中倍加半夏五味以滌飲而收陰加乾薑細辛以散結而分邪合而用之令藥力適在痰邪綰結之處攻擊片時則無形之感從肌膚出有形之痰從水道出頃刻分解無餘而膺胸空曠不復叢生小痤矣若泥麻桂甘溫減去不用則不成其為龍矣將恃何物為翻波鼓浪之具乎變青龍湯經制改用白虎湯權宜五法服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之原文大汗出則津液外亡大煩渴則躁熱內極脈轉洪大則凶變將起青龍湯為不對矣計惟白虎湯可兩解表裡之熱加人參可潤燥止渴也傷寒脈浮滑此表有熱里有寒白虎湯主之原文傷寒之脈陰陽俱緊此雲浮滑則兼風可知滑為裡熱浮滑則表亦熱矣里有寒者傷寒傳入於裡更增裡熱但因起於寒故推本而曰里有寒實則表裡俱為熱極也傷寒脈浮發熱無汗其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之原文白虎湯但能解熱不能解表必惡寒身疼痛之表證皆除但熱渴而求救於水者方可與之傷寒無大熱口燥渴心煩背微惡寒者白虎加人參湯主之原文表裡熱極燥渴心煩全無惡寒頭疼身痛諸表證者固當行白虎矣若脈浮滑背微惡寒此為表熱少裡熱多之證仍可與之蓋以脈滑明系裡熱而背為至陰之地雖表退尚有餘寒不當牽泥也設脈但浮而不滑證兼頭疼身痛則雖表裡俱熱而在表之邪渾未退白虎湯即不可用以白虎辛涼不能解表故也此條辨證最細脈滑而帶浮渾身無大熱又不惡寒但背間微覺惡寒是表邪已將罷其人口燥渴心煩是裡熱已大熾更不可姑待而當急為清解恐遲則熱深津竭無救於事耳門人問用白虎則表熱不解用青龍則裡熱轉增試擬議於二者之間不識當用何法答曰惟於大青龍湯中倍增石膏少減麻桂或見寒多風少則用麻杏甘石湯亦倍增石膏少減麻黃斯固圓機然亦即可為定法矣傷寒病若吐若下後七八日不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者白虎加人參湯主之原文玩此條表證比前較重何以亦用白虎耶本文熱結在裡表裡俱熱二句已自酌量惟熱結在裡所以表熱不除況加大渴飲水安得不以清裡為急耶白虎五證得隸青龍後者以風寒俱有故也寒與風皆傷宜從辛甘發散矣而表與里又俱熱則溫熱為不可用欲並風寒表裡之熱而俱解之不其難乎故立白虎湯一法以輔青龍之不逮其藥乃石膏知母辛涼之二物也辛者西方金也涼者秋令也酷熱之時欲求金風薦爽萬不可得計惟虎嘯則山谷間習習風生風生則熱解耳所以取辛涼二物偶而成方以象白虎之陰也夫青龍變化莫測方無定體故各用制伏之法若白虎則地獸之靈得風從而其威愈震亦不易制伏之物況裡熱已極津液垂亡元氣所存無幾而領西方之肅殺以入胃中能無慮乎於是以甘草之甘緩和其猛性而入米同煎以助胃中水穀之氣虛者更加人參以助胃中天真之氣乃可用之而無患製法早具於一方之內矣世傳孫思邈有降龍伏虎之能豈非以仲景之心法為道法耶夫以石膏一物之微入甘溫隊中則為青龍從清涼同氣則為白虎惟文武聖神之哲乃能用之恰當此龍虎所為慶風雲之會也設在表之風寒未除當用青龍而反用白虎設在裡之熱渴已逼當用白虎而反用青龍則用者之誤竟與倒行逆施者同類寧不敗乃事乎傷心哉千古興亡之際同一醫轍矣
